# Dependabot configuration.
#
# Why this file exists (2026-06-05): the GitHub-managed "Graph Update: pip"
# job aborts on every push to main because backend/pyproject.toml declares a
# local path dependency (qontinui-schemas = {path = "../../qontinui-schemas"})
# whose manifest lives OUTSIDE this repository — Dependabot's file fetcher
# clamps the path to qontinui-schemas/pyproject.toml, can't retrieve it, and
# errors the whole pip graph job. `exclude-paths` tells the fetcher to skip
# that path (updater experiment enable-exclude-paths-subdirectory-manifest-files).
# Security ALERTS are unaffected either way — they come from server-side
# lockfile parsing, which has worked throughout.
#
# Version-update PRs stay DISABLED (open-pull-requests-limit: 0): Dependabot
# commits carry no Session-Id/Session-Name trailers and would fail the
# Verify Session-Id gate. Dependency bumps are done by sessions following
# plans/2026-06-04-dependabot-backlog-remediation.md (archived in dev-notes).
version: 2
exclude-paths:
  - "qontinui-schemas"
updates:
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
