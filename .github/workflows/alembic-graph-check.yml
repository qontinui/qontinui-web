name: alembic graph check

# Phase 5C of the multi-machine coordinator plan
# (D:/qontinui-root/tmp_multimachine_coordinator_plan.md §9).
#
# Runs `alembic heads` after every PR merge to main. If more than one
# head appears, comments on the merging PR with both heads + a recommended
# `alembic merge` command. The job is informational, not blocking — by
# the time it runs, the merge has already happened. Its purpose is to
# turn "silent fork lying around in the chain for weeks" into
# "loud notification right at merge time."
#
# A separate gate (run on pull_request, blocking) lives next to this
# in alembic-claim-check.yml — that one rejects PRs whose new revision's
# down_revision doesn't match what the contributor claimed via the
# coord service. Together they defend the alembic graph against
# accidental forks (this workflow) and intentional but uncoordinated
# forks (the claim-check workflow).

on:
  push:
    branches: [main]
    paths:
      - "backend/alembic/versions/**"

permissions:
  contents: read
  pull-requests: write   # so the job can comment on the just-merged PR

jobs:
  alembic-heads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install alembic + sqlalchemy
        run: |
          python -m pip install --upgrade pip
          pip install alembic sqlalchemy

      - name: Count heads
        id: heads
        working-directory: backend
        run: |
          # alembic heads runs OFFLINE (no DB) when given a chain dir;
          # it parses revision files only. We want a count, not the IDs
          # for the gate logic; the IDs go in the comment body if there's
          # a problem.
          set -euo pipefail
          # Use the alembic API directly to avoid env.py's DB connection.
          # The "heads" subcommand of alembic CLI does need to load env.py
          # which imports app models; we sidestep that with a python
          # one-liner that scans versions/*.py for revisions with no
          # children.
          python -c "
          import os, re, glob
          rev_re = re.compile(r'^revision[: ]+\s*=\s*[\"\'](.+?)[\"\']', re.M)
          down_re = re.compile(r'^down_revision[: ]+\s*=\s*(.+)$', re.M)
          revs = {}
          parents = set()
          for p in glob.glob('alembic/versions/*.py'):
              with open(p, encoding='utf-8') as f:
                  s = f.read()
              m = rev_re.search(s)
              if not m:
                  continue
              rev = m.group(1)
              dm = down_re.search(s)
              down = dm.group(1).strip() if dm else 'None'
              # down might be a tuple, list, None, or a quoted string —
              # we only care about counting, so just look for child references.
              for ref in re.findall(r'[\"\'](\w[\w]*)[\"\']', down):
                  parents.add(ref)
              revs[rev] = down
          heads = [r for r in revs if r not in parents]
          print('HEAD_COUNT=' + str(len(heads)))
          for h in heads:
              print('HEAD=' + h)
          " | tee heads.txt
          count=$(grep -c '^HEAD=' heads.txt || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 1 ]; then
            heads_list=$(grep '^HEAD=' heads.txt | sed 's/^HEAD=//' | tr '\n' ' ')
            echo "heads_list=$heads_list" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on merging PR if forked
        if: steps.heads.outputs.count > 1 && github.event.head_commit.message != ''
        uses: actions/github-script@v7
        with:
          script: |
            const heads = "${{ steps.heads.outputs.heads_list }}".trim().split(/\s+/);
            const sha = context.sha;
            // Find the PR that produced this merge commit.
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            if (!prs.data.length) {
              core.warning(`No PR associated with ${sha}; skipping comment`);
              return;
            }
            const pr_number = prs.data[0].number;
            const heads_md = heads.map(h => `\`${h}\``).join(', ');
            const merge_cmd = `alembic merge -m "merge ${heads.join(' and ')}" ${heads.join(' ')}`;
            const body = [
              `### ⚠️ Alembic chain forked`,
              ``,
              `After merging this PR, \`backend/alembic/versions/\` now has **${heads.length} heads**:`,
              ``,
              ...heads.map(h => `- \`${h}\``),
              ``,
              `Per coordinator plan §9, this means concurrent revision authoring landed without a coordinated merge. Resolve with:`,
              ``,
              '```bash',
              `cd backend`,
              merge_cmd,
              `git add alembic/versions/<merge_file>.py && git commit -m "chore(alembic): merge sibling heads"`,
              `git push`,
              '```',
              ``,
              `The merge revision is empty bookkeeping (just joins parents); it's a no-op DDL. To prevent future forks, contributors should claim \`down_revision\` via \`/coord/claims/acquire\` before authoring (see coordinator plan §9 sibling-head guard).`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body,
            });
            core.warning(`Alembic chain has ${heads.length} heads after this merge: ${heads.join(', ')}`);
