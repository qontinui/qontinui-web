name: Backend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    # main is included so the per-test coverage producer step (gated on
    # push-to-main below) actually fires; the gating jobs still run on
    # push-to-main too, which is harmless (they already run on PRs into main).
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v5

      # qontinui (a path-dep) pulls in torch from pytorch-cu128 — wheels
      # are large enough to overflow the runner's default disk. Remove
      # preinstalled SDKs/runtimes that this workflow doesn't use.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      # Backend's pyproject.toml has path-deps on sibling repos
      # (qontinui-schemas, qontinui). actions/checkout@v5 refuses
      # `path:` outside the workspace, so clone them via git directly.
      # qontinui-cloud-control is now AGPL/public — plain clone so the test
      # harness can side-effect-import it (see backend/tests/conftest.py).
      - name: Checkout sibling repos (qontinui-schemas, qontinui, qontinui-cloud-control)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git
          git clone --depth 1 https://github.com/jspinak/qontinui.git
          git clone --depth 1 https://github.com/qontinui/qontinui-cloud-control.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install qontinui-cloud-control into poetry venv
        # Path is ../../qontinui-cloud-control because working-directory is
        # ./backend (one level deeper than the repo root the clone sits beside).
        run: poetry run pip install -e ../../qontinui-cloud-control

      - name: Run ruff (linting)
        run: poetry run ruff check .

      - name: Run ruff format (formatting)
        run: poetry run ruff format --check .

      - name: Run mypy (type checking)
        run: poetry run mypy app/ --ignore-missing-imports

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        # pgvector/pgvector:pg16 is the official pgvector-bundled image
        # (Docker Hub). It's a drop-in replacement for postgres:16 — same
        # POSTGRES_* env vars, same pg_isready healthcheck — and ships the
        # `vector` extension so the `CREATE EXTENSION` step below succeeds.
        # Stock postgres:16 doesn't, which makes conftest's
        # Base.metadata.create_all fail with:
        #   asyncpg.exceptions.UndefinedObjectError: type "vector" does not exist
        # for any model that has a pgvector.sqlalchemy.Vector column (see
        # alembic/versions/05a366f58455_initial_schema_squashed.py:13,26).
        image: pgvector/pgvector:pg16
        # Credentials must match backend/tests/conftest.py, which hardcodes
        # postgresql://qontinui_user:qontinui_dev_password@localhost:5432/qontinui_test
        # for both DATABASE_URL and TEST_DATABASE_URL. Mismatched values
        # produce: asyncpg.exceptions.InvalidPasswordError: password
        # authentication failed for user "qontinui_user".
        env:
          POSTGRES_USER: qontinui_user
          POSTGRES_PASSWORD: qontinui_dev_password
          POSTGRES_DB: qontinui_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      # qontinui (a path-dep) pulls in torch from pytorch-cu128 — wheels
      # are large enough to overflow the runner's default disk. Remove
      # preinstalled SDKs/runtimes that this workflow doesn't use.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      # Backend's pyproject.toml has path-deps on sibling repos
      # (qontinui-schemas, qontinui). actions/checkout@v5 refuses
      # `path:` outside the workspace, so clone them via git directly.
      # qontinui-cloud-control is now AGPL/public — plain clone so the test
      # harness can side-effect-import it (see backend/tests/conftest.py).
      - name: Checkout sibling repos (qontinui-schemas, qontinui, qontinui-cloud-control)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git
          git clone --depth 1 https://github.com/jspinak/qontinui.git
          git clone --depth 1 https://github.com/qontinui/qontinui-cloud-control.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install qontinui-cloud-control into poetry venv
        # Path is ../../qontinui-cloud-control because working-directory is
        # ./backend (one level deeper than the repo root the clone sits beside).
        run: poetry run pip install -e ../../qontinui-cloud-control

      # backend/tests/conftest.py uses Base.metadata.create_all (NOT
      # alembic) to bootstrap the test DB, so SQLAlchemy will try to
      # create tables in named schemas without first ensuring the
      # schemas exist. Models reference `project`, `auth`, and `cloud`
      # schemas (the last via the qontinui-cloud-control sibling repo
      # whose models are side-effect-imported in conftest.py); the
      # postgres service container doesn't run our init-scripts/, so
      # create them explicitly here. We also `CREATE EXTENSION vector`
      # — alembic does this in 05a366f58455 but conftest skips alembic,
      # so create_all hits `UndefinedObjectError: type "vector" does
      # not exist` whenever a Vector column is materialized. Without
      # the schema lines, create_all fails with:
      #   asyncpg.exceptions.InvalidSchemaNameError: schema "project"
      #   does not exist
      # Keep the committed OpenAPI snapshot authoritative. The exporter calls
      # app.openapi() (the FastAPI method — computes the schema from the
      # registered routes with no running server and no DB connection), writes
      # frontend/src/lib/api-client/openapi-schema.json deterministically, then
      # `git diff --exit-code` fails CI if a backend route change wasn't
      # accompanied by a regenerated, committed snapshot. coord's
      # external-surface (route-serving) observer reads this file as the
      # declared-route source of truth, so a stale snapshot silently
      # mis-declares the web backend's external surface. Runs before the tests
      # so a drift failure surfaces fast; the env mirrors the test step so the
      # app imports cleanly offline (no DB is contacted).
      - name: Check OpenAPI snapshot is up to date
        env:
          DATABASE_URL: postgresql://qontinui_user:qontinui_dev_password@localhost:5432/qontinui_test
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-characters-long
          TESTING: 1
          REDIS_ENABLED: false
        run: |
          poetry run python scripts/export_openapi.py
          if ! git -C "$GITHUB_WORKSPACE" diff --exit-code \
              frontend/src/lib/api-client/openapi-schema.json; then
            echo "::error::OpenAPI snapshot is stale. A backend route change was not committed to the snapshot."
            echo "Run 'python backend/scripts/export_openapi.py' from the repo root and commit the updated frontend/src/lib/api-client/openapi-schema.json."
            exit 1
          fi

      # On drift, upload the CI-generated snapshot so the canonical bytes (this
      # job's exact dependency versions) can be committed verbatim — avoids
      # guessing at fastapi/starlette/pydantic version differences between a
      # local regen and CI.
      - name: Upload CI-generated OpenAPI snapshot on drift
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema-ci-generated
          path: frontend/src/lib/api-client/openapi-schema.json
          if-no-files-found: ignore

      - name: Create test schemas and extensions
        env:
          PGPASSWORD: qontinui_dev_password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U qontinui_user -d qontinui_test \
            -c "CREATE SCHEMA IF NOT EXISTS project;" \
            -c "CREATE SCHEMA IF NOT EXISTS auth;" \
            -c "CREATE SCHEMA IF NOT EXISTS cloud;" \
            -c "CREATE SCHEMA IF NOT EXISTS coord;" \
            -c "CREATE SCHEMA IF NOT EXISTS strategy;" \
            -c "CREATE SCHEMA IF NOT EXISTS web;" \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run tests with coverage
        env:
          # conftest.py overrides this anyway, but keep aligned with the
          # postgres service creds for clarity.
          DATABASE_URL: postgresql://qontinui_user:qontinui_dev_password@localhost:5432/qontinui_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_ENABLED: true
          TESTING: 1
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-characters-long
          ENVIRONMENT: development
        run: |
          poetry run pytest tests/ -v \
            --cov=app \
            --cov-context=test \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --junitxml=junit-results.xml

      # Per-test -> touched-file coverage producer. Runs ONLY on push-to-main:
      # the coverage map is cached per (repo, head_sha) in coord, so PR lanes
      # consume it but never produce — this step's cost never gates a PR. It is
      # best-effort (the script exits 0 on any failure), so it cannot fail the
      # gating test job even when coord is unreachable. The `--cov-context=test`
      # flag above makes coverage.py record which test touched each line; this
      # step reads that .coverage SQLite db and POSTs the observations + the
      # JUnit results to coord's existing ingest routes.
      - name: Export per-test coverage to coord (main only, best-effort)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_SHA: ${{ github.sha }}
          # COORD_HTTP_URL defaults to https://coord.qontinui.io inside the
          # script; override here only if a non-prod coord is targeted.
        run: |
          # Prove the extractor's own correctness on every run before trusting
          # it against the real db (fast, no network).
          python scripts/export_test_coverage.py --self-test
          python scripts/export_test_coverage.py \
            --coverage-db .coverage \
            --junit-xml junit-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: ./backend/htmlcov/
          retention-days: 30

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        # SARIF upload requires GitHub Advanced Security on private repos.
        # Without GHAS the API returns 403; don't red-flag the whole job —
        # the SARIF artifact is still uploaded as a workflow artifact below.
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout sibling repos (qontinui-schemas, qontinui, qontinui-cloud-control)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git
          git clone --depth 1 https://github.com/jspinak/qontinui.git
          git clone --depth 1 https://github.com/qontinui/qontinui-cloud-control.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install qontinui-cloud-control into poetry venv
        # Path is ../../qontinui-cloud-control because working-directory is
        # ./backend (one level deeper than the repo root the clone sits beside).
        run: poetry run pip install -e ../../qontinui-cloud-control

      - name: Run safety check (dependency vulnerabilities)
        run: |
          poetry run pip install safety
          poetry run safety check --json || true

  build-test:
    name: Test Docker Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v5

      # The Dockerfile installs torch from pytorch-cu128 (multi-GB wheels);
      # the runner's default disk allocation isn't enough for the build
      # layers + image cache. Free the host's preinstalled SDKs before
      # docker build runs.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Build Docker image
        run: docker build -t qontinui-backend:test .

      - name: Test Docker image
        run: |
          docker run --rm qontinui-backend:test python -c "import app; print('Import successful')"
