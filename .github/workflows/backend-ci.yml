name: Backend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    # main is intentionally NOT here: the per-test coverage producer that used to
    # ride this gating workflow on push-to-main now lives in the standalone,
    # non-gating .github/workflows/backend-coverage-producer.yml. Keeping main off
    # this trigger avoids re-running the full gating suite (lint, security-scan,
    # build-test, tests) on every main push — it already ran on the PR.
    branches: [develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  # Nightly run with NO path filter. The "Check OpenAPI snapshot is up to date"
  # step regenerates the snapshot with the sibling repos installed — notably
  # qontinui-cloud-control, which is git-cloned + `pip install -e`'d in the test
  # job but lives OUTSIDE backend/**. A cloud-control (or other sibling) route
  # change therefore never triggers the path-filtered PR/push runs above, so it
  # would SILENTLY stale the committed openapi-schema.json that coord's
  # external-surface observer reads as the api's declared-route source. The
  # nightly run makes that drift loud (the drift-check fails) instead of silent.
  schedule:
    - cron: '17 7 * * *' # 07:17 UTC daily
  workflow_dispatch: {}

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: Lint & Format Check
    # Self-hosted runners (label 'qontinui') have Python 3.12 pre-installed
    # plus a persistent pip cache — avoids the ubuntu-latest cold-boot tax
    # (~90s of action downloads + apt + pip warmup per run). Requires a
    # self-hosted runner to be online; if none are available the job
    # queues until one comes up (no automatic ubuntu-latest fallback).
    runs-on: [self-hosted, qontinui]
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v5

      # Backend's pyproject.toml has path-deps on sibling repos
      # (qontinui-schemas, qontinui). actions/checkout@v5 refuses
      # `path:` outside the workspace, so clone them via git directly.
      # qontinui-cloud-control is now AGPL/public — plain clone so the test
      # harness can side-effect-import it (see backend/tests/conftest.py).
      # Self-hosted runners reuse $GITHUB_WORKSPACE/..; remove stale clones
      # first so each run starts from a known state.
      - name: Checkout sibling repos (qontinui-schemas, qontinui, qontinui-cloud-control)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          rm -rf qontinui-schemas qontinui qontinui-cloud-control
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git
          git clone --depth 1 https://github.com/jspinak/qontinui.git
          git clone --depth 1 https://github.com/qontinui/qontinui-cloud-control.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install qontinui-cloud-control into poetry venv
        # Path is ../../qontinui-cloud-control because working-directory is
        # ./backend (one level deeper than the repo root the clone sits beside).
        run: poetry run pip install -e ../../qontinui-cloud-control

      - name: Run ruff (linting)
        run: poetry run ruff check .

      - name: Run ruff format (formatting)
        run: poetry run ruff format --check .

      - name: Run mypy (type checking)
        run: poetry run mypy app/ --ignore-missing-imports

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        # pgvector/pgvector:pg16 is the official pgvector-bundled image
        # (Docker Hub). It's a drop-in replacement for postgres:16 — same
        # POSTGRES_* env vars, same pg_isready healthcheck — and ships the
        # `vector` extension so the `CREATE EXTENSION` step below succeeds.
        # Stock postgres:16 doesn't, which makes conftest's
        # Base.metadata.create_all fail with:
        #   asyncpg.exceptions.UndefinedObjectError: type "vector" does not exist
        # for any model that has a pgvector.sqlalchemy.Vector column (see
        # alembic/versions/05a366f58455_initial_schema_squashed.py:13,26).
        image: pgvector/pgvector:pg16
        # Credentials must match backend/tests/conftest.py, which hardcodes
        # postgresql://qontinui_user:qontinui_dev_password@localhost:5432/qontinui_test
        # for both DATABASE_URL and TEST_DATABASE_URL. Mismatched values
        # produce: asyncpg.exceptions.InvalidPasswordError: password
        # authentication failed for user "qontinui_user".
        env:
          POSTGRES_USER: qontinui_user
          POSTGRES_PASSWORD: qontinui_dev_password
          POSTGRES_DB: qontinui_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      # qontinui (a path-dep) pulls in torch from pytorch-cu128 — wheels
      # are large enough to overflow the runner's default disk. Remove
      # preinstalled SDKs/runtimes that this workflow doesn't use.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      # Backend's pyproject.toml has path-deps on sibling repos
      # (qontinui-schemas, qontinui). actions/checkout@v5 refuses
      # `path:` outside the workspace, so clone them via git directly.
      # qontinui-cloud-control is now AGPL/public — plain clone so the test
      # harness can side-effect-import it (see backend/tests/conftest.py).
      - name: Checkout sibling repos (qontinui-schemas, qontinui, qontinui-cloud-control)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git
          git clone --depth 1 https://github.com/jspinak/qontinui.git
          git clone --depth 1 https://github.com/qontinui/qontinui-cloud-control.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install qontinui-cloud-control into poetry venv
        # Path is ../../qontinui-cloud-control because working-directory is
        # ./backend (one level deeper than the repo root the clone sits beside).
        run: poetry run pip install -e ../../qontinui-cloud-control

      # backend/tests/conftest.py uses Base.metadata.create_all (NOT
      # alembic) to bootstrap the test DB, so SQLAlchemy will try to
      # create tables in named schemas without first ensuring the
      # schemas exist. Models reference `project`, `auth`, and `cloud`
      # schemas (the last via the qontinui-cloud-control sibling repo
      # whose models are side-effect-imported in conftest.py); the
      # postgres service container doesn't run our init-scripts/, so
      # create them explicitly here. We also `CREATE EXTENSION vector`
      # — alembic does this in 05a366f58455 but conftest skips alembic,
      # so create_all hits `UndefinedObjectError: type "vector" does
      # not exist` whenever a Vector column is materialized. Without
      # the schema lines, create_all fails with:
      #   asyncpg.exceptions.InvalidSchemaNameError: schema "project"
      #   does not exist
      # Keep the committed OpenAPI snapshot authoritative. The exporter calls
      # app.openapi() (the FastAPI method — computes the schema from the
      # registered routes with no running server and no DB connection), writes
      # frontend/src/lib/api-client/openapi-schema.json deterministically, then
      # `git diff --exit-code` fails CI if a backend route change wasn't
      # accompanied by a regenerated, committed snapshot. coord's
      # external-surface (route-serving) observer reads this file as the
      # declared-route source of truth, so a stale snapshot silently
      # mis-declares the web backend's external surface. Runs before the tests
      # so a drift failure surfaces fast; the env mirrors the test step so the
      # app imports cleanly offline (no DB is contacted).
      - name: Check OpenAPI snapshot is up to date
        env:
          DATABASE_URL: postgresql://qontinui_user:qontinui_dev_password@localhost:5432/qontinui_test
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-characters-long
          TESTING: 1
          REDIS_ENABLED: false
        run: |
          # Two snapshots, two processes (the app is built at import time, so
          # one process cannot re-import with different env): the extended spec
          # (with the cloud-control sibling CI installs) and the BASE spec
          # (QONTINUI_DISABLE_CLOUD_EXTENSIONS=1 — the surface prod
          # api.qontinui.io actually serves; coord's route-serving observer
          # reads this one).
          poetry run python scripts/export_openapi.py
          poetry run python scripts/export_openapi.py --base
          if ! git -C "$GITHUB_WORKSPACE" diff --exit-code \
              frontend/src/lib/api-client/openapi-schema.json \
              frontend/src/lib/api-client/openapi-schema.base.json; then
            echo "::error::OpenAPI snapshot is stale. A backend route change was not committed to the snapshot(s)."
            echo "Run 'python backend/scripts/export_openapi.py' and 'python backend/scripts/export_openapi.py --base' from the repo root and commit the updated frontend/src/lib/api-client/openapi-schema*.json."
            exit 1
          fi

      # On drift, upload the CI-generated snapshot so the canonical bytes (this
      # job's exact dependency versions) can be committed verbatim — avoids
      # guessing at fastapi/starlette/pydantic version differences between a
      # local regen and CI.
      - name: Upload CI-generated OpenAPI snapshot on drift
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema-ci-generated
          path: |
            frontend/src/lib/api-client/openapi-schema.json
            frontend/src/lib/api-client/openapi-schema.base.json
          if-no-files-found: ignore

      - name: Create test schemas and extensions
        env:
          PGPASSWORD: qontinui_dev_password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U qontinui_user -d qontinui_test \
            -c "CREATE SCHEMA IF NOT EXISTS project;" \
            -c "CREATE SCHEMA IF NOT EXISTS auth;" \
            -c "CREATE SCHEMA IF NOT EXISTS cloud;" \
            -c "CREATE SCHEMA IF NOT EXISTS coord;" \
            -c "CREATE SCHEMA IF NOT EXISTS strategy;" \
            -c "CREATE SCHEMA IF NOT EXISTS web;" \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run tests with coverage
        env:
          # conftest.py overrides this anyway, but keep aligned with the
          # postgres service creds for clarity.
          DATABASE_URL: postgresql://qontinui_user:qontinui_dev_password@localhost:5432/qontinui_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_ENABLED: true
          TESTING: 1
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-characters-long
          ENVIRONMENT: development
        run: |
          poetry run pytest tests/ -v \
            --cov=app \
            --cov-context=test \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --junitxml=junit-results.xml

      # The per-test -> touched-file coverage producer that used to run here on
      # push-to-main now lives in the standalone, non-gating workflow
      # .github/workflows/backend-coverage-producer.yml (it re-runs the suite with
      # the same flags + service stack, then exports). It was moved out so a main
      # push no longer re-runs this entire gating workflow just to feed coord.
      # The pytest invocation above keeps --cov-context=test / --junitxml: those
      # flags are harmless on PRs and keep the two suites byte-identical.

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: ./backend/htmlcov/
          retention-days: 30

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        # SARIF upload requires GitHub Advanced Security on private repos.
        # Without GHAS the API returns 403; don't red-flag the whole job —
        # the SARIF artifact is still uploaded as a workflow artifact below.
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout sibling repos (qontinui-schemas, qontinui, qontinui-cloud-control)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git
          git clone --depth 1 https://github.com/jspinak/qontinui.git
          git clone --depth 1 https://github.com/qontinui/qontinui-cloud-control.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install qontinui-cloud-control into poetry venv
        # Path is ../../qontinui-cloud-control because working-directory is
        # ./backend (one level deeper than the repo root the clone sits beside).
        run: poetry run pip install -e ../../qontinui-cloud-control

      - name: Run safety check (dependency vulnerabilities)
        run: |
          poetry run pip install safety
          poetry run safety check --json || true

  build-test:
    name: Test Docker Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v5

      # The Dockerfile installs torch from pytorch-cu128 (multi-GB wheels);
      # the runner's default disk allocation isn't enough for the build
      # layers + image cache. Free the host's preinstalled SDKs before
      # docker build runs.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Build Docker image
        run: docker build -t qontinui-backend:test .

      - name: Test Docker image
        run: |
          docker run --rm qontinui-backend:test python -c "import app; print('Import successful')"
