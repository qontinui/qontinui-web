name: Cross-browser Survey

# Phase 3 cross-browser baseline collection. Lives in its own workflow
# file (not e2e-tests.yml) so that a newer push to main cannot cancel
# an in-flight Mobile Chrome — `e2e-tests.yml` uses `cancel-in-progress:
# true`, which is correct for the chromium merge gate (you want the
# latest commit's results) but lethal for this survey: the slowest
# matrix entry (Mobile Chrome) runs ~30min and was observed cancelled
# by concurrency-guard in two consecutive runs (25539840378 at 25:14,
# 25540759975 at 29:02) when the next push to main hit. Per-job
# concurrency overrides cannot rescue jobs from a workflow-level
# cancel; only a separate workflow file with its own concurrency
# scope can.

on:
  # Push trigger removed 2026-05-18 — survey is informational only (no
  # merge gate depends on it) and a 30-60 min per-browser run on every
  # push to main/develop is poor value vs. catching the same regressions
  # in the nightly cron. Reinstate the push trigger if survey deltas
  # ever block on something faster than nightly.
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# Queue, don't cancel. A newer push triggers a new survey that waits
# for the in-flight one to finish, so every commit's survey lands
# eventually. Worst case is N sequential surveys for N rapid pushes —
# acceptable for an informational job; no merge gate depends on it.
concurrency:
  group: cross-browser-survey-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cross-browser-survey:
    name: Frontend E2E Tests — cross-browser survey (${{ matrix.browser }})
    if: github.event_name != 'pull_request'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      # Each browser runs independently; one engine timing out should
      # not cancel the others.
      fail-fast: false
      matrix:
        include:
          - browser: firefox
            browser-slug: firefox
            engine: firefox
          - browser: webkit
            browser-slug: webkit
            engine: webkit
          - browser: Mobile Chrome
            browser-slug: mobile-chrome
            engine: chromium
          - browser: Mobile Safari
            browser-slug: mobile-safari
            engine: webkit

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Clone sibling dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC_TOKEN: ${{ secrets.web_ci_cloud_control_read }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
            "qontinui/ui-bridge" \
            "qontinui/qontinui-workflow-ui" \
            "qontinui/qontinui-workflow-utils" \
            "qontinui/qontinui-navigation" \
          ; do
            repo_name="${spec#*/}"
            target="../${repo_name}"
            echo "::group::Cloning ${spec} → ${target}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "${target}"
            echo "::endgroup::"
          done
          echo "::group::Cloning jspinak/qontinui-cloud-control → ../qontinui-cloud-control"
          git clone --depth 1 \
            "https://x-access-token:${CC_TOKEN}@github.com/jspinak/qontinui-cloud-control.git" \
            "../qontinui-cloud-control"
          echo "::endgroup::"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -e ../../qontinui-cloud-control

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # Install chromium PLUS the engine this matrix entry needs.
      # The `setup` project (auth.setup.ts) runs in chromium for every
      # matrix entry — Playwright resolves project dependencies before
      # running the target project, and the firefox/webkit/Mobile-*
      # projects all `dependencies: ["setup"]`. Without chromium
      # installed, auth.setup fails with `Executable doesn't exist at
      # .../chromium_headless_shell-*` and every dependent test skips.
      # Mobile Chrome's engine is already chromium; for the other three
      # entries this adds chromium alongside firefox/webkit. `npx
      # playwright install` is idempotent, so passing chromium twice is
      # a no-op when it's already in the list.
      - name: Install Playwright browsers (chromium for setup + ${{ matrix.engine }})
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium ${{ matrix.engine }}

      - name: Create runner schema
        env:
          PGPASSWORD: test_password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U test_user -d test_db -c "CREATE SCHEMA IF NOT EXISTS runner;"

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          alembic upgrade heads

      - name: Create dev user for E2E auth setup
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          python create_admin.py

      # Single project per matrix entry. workers=1 (inherited from
      # playwright.config.ts) keeps within-project execution serial; the
      # parallelism is between matrix entries.
      - name: Run cross-browser survey (${{ matrix.browser }})
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3001
        run: |
          npx playwright test --project="${{ matrix.browser }}"

      # Artifact names must be unique across matrix entries
      # (actions/upload-artifact@v4 rejects collisions). browser-slug
      # avoids spaces in artifact names ("mobile-chrome" not "Mobile Chrome").
      - name: Upload survey Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-cross-browser-survey-${{ matrix.browser-slug }}
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload survey test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cross-browser-survey-test-results-${{ matrix.browser-slug }}
          path: frontend/test-results/
          retention-days: 30
