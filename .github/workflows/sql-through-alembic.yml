name: sql-through-alembic lint

on:
  pull_request:
    paths:
      - '**/*.sql'

permissions:
  contents: read

jobs:
  sql-through-alembic:
    name: Verify .sql files have companion alembic revisions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sql-through-alembic lint
        run: |
          python .github/scripts/sql_through_alembic_lint.py \
            --base-ref origin/main \
            --head-ref HEAD
