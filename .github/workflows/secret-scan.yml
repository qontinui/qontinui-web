name: Secret Scan
on:
  pull_request:
permissions:
  contents: read
jobs:
  gitleaks:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks (binary — the marketplace action requires a paid org license)
        run: |
          # Version resolution must never be able to fail the scan.
          # Unauthenticated api.github.com is 60 req/hr per runner IP, shared across
          # the whole GitHub-hosted fleet; when rate-limited the response body has no
          # tag_name, grep exits 1, and `bash -e` killed this step ~200ms in — before
          # the download, before anything was scanned. That surfaced as a bogus secret
          # scan FAILURE on clean diffs. github.token raises the budget to 1000/hr,
          # and the `|| true` + pinned fallback degrade a lookup miss to "scan with a
          # slightly older pinned gitleaks" instead of "abort the job".
          # Do not "tidy" the auth header, the `|| true`, or the fallback away.
          GL_FALLBACK=8.30.1
          GL=$(curl -sSL -H "Authorization: Bearer ${{ github.token }}" \
                 https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
                 | grep -oP '"tag_name":\s*"v\K[^"]+' || true)
          GL="${GL:-$GL_FALLBACK}"
          echo "gitleaks v${GL}"
          curl -sSL --retry 3 --retry-delay 2 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          # A scanner we could not obtain must fail loudly, never silently pass the job.
          ./gitleaks version
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
