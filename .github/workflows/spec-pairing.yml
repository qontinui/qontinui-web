name: Spec Pairing Gate

# Verify every legacy `*.spec.uibridge.json` is paired with an IR file
# under `frontend/specs/pages/<id>/`, and that the pairing round-trips
# cleanly (group count + ids + assertion total match the IR's forward
# projection).
#
# Currently warn-only: web has 19 legacy specs without paired IR files
# because the per-page IR migration codemod
# (`@qontinui/ui-bridge-auto migrate-uibridge-spec`) hasn't been run on
# this repo yet. The gate will surface every missing pairing on every
# PR, providing pressure to run the codemod. Once the migration lands
# and the gate reports `missing: 0, mismatched: 0`, flip `--mode=warn`
# to `--mode=block`.
#
# Local snapshot at workflow creation: paired: 0, missing: 19, mismatched: 0.

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.spec.uibridge.json"
      - "**/specs/pages/**"
      - ".github/workflows/spec-pairing.yml"
  push:
    branches: [main]
    paths:
      - "**/*.spec.uibridge.json"
      - "**/specs/pages/**"
      - ".github/workflows/spec-pairing.yml"
  workflow_dispatch:

jobs:
  check-pairing:
    name: Check spec <-> IR pairing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout qontinui-web
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run pairing check (warn-only)
        run: npx --yes -p @qontinui/ui-bridge-auto check-spec-pairing --root . --app qontinui-web --mode=warn
