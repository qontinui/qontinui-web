name: verify-alembic-claim

# Phase 5C of the multi-machine coordinator plan
# (D:/qontinui-root/tmp_multimachine_coordinator_plan.md §9).
#
# Pre-merge BLOCKING gate: every PR adding an alembic revision must show
# that the contributor pre-claimed the down_revision via the coord
# service. Pairs with the post-merge informational alembic-graph-check
# workflow:
#
#   alembic-graph-check.yml      — runs after merge; comments on the
#                                  merging PR if the chain forked.
#   verify-alembic-claim.yml     — runs on every PR; fails the build
#                                  if the new revisions lack claims.
#
# The coord service exposes POST /coord/claims/check which queries
# coord.claims_audit for an "acquire" event with the matching down_rev
# and revision_id. Returns {matched: bool, reason: str}.
#
# Configuration:
#
#   secrets.COORD_URL — base URL of the coord service (e.g.
#                       https://coord.qontinui.io). Required to run
#                       the check; unset → workflow skipped with
#                       a warning so OSS forks without a coord service
#                       aren't blocked.

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/alembic/versions/**"

permissions:
  contents: read

jobs:
  verify-claim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so git diff against the PR base resolves.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Skip if COORD_URL not configured
        if: ${{ secrets.COORD_URL == '' }}
        run: |
          echo "::warning::COORD_URL secret not set; verify-alembic-claim gate skipped."
          echo "If you intend this gate to run, configure COORD_URL in repo secrets."
          exit 0

      - name: Run verify_alembic_claim.py
        if: ${{ secrets.COORD_URL != '' }}
        env:
          COORD_URL: ${{ secrets.COORD_URL }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # base-ref is the branch the PR targets, prefixed with
          # origin/ for the local diff. We fetched depth=0 so the
          # ref exists locally.
          python scripts/verify_alembic_claim.py \
            --base-ref "origin/${BASE_REF}" \
            --coord-url "${COORD_URL}"
