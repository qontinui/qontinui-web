name: E2E Integration Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  # Run the full sharded E2E suite nightly. The on-PR smoke job is the
  # gating signal for merging; this scheduled run catches regressions the
  # smoke set doesn't cover, without ever blocking a PR.
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# Cancel in-progress runs when a newer commit lands on the same ref. Without
# this, every push or PR update spawns a fresh ~1h+ E2E run while the prior
# one keeps grinding — six concurrent 5h runs were observed in flight at
# once before this guard was added.
concurrency:
  group: e2e-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # backend/pyproject.toml has path deps on ../../qontinui-schemas
      # and ../../qontinui; without these clones, `pip install -e .`
      # fails with ENOENT. qontinui-cloud-control is needed for the test
      # harness's side-effect import (see backend/tests/conftest.py); it
      # lives under jspinak/ and is private, so default GITHUB_TOKEN
      # (scoped to qontinui-web) can't read it — use a dedicated PAT.
      - name: Clone backend Python sibling deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC_TOKEN: ${{ secrets.web_ci_cloud_control_read }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
          ; do
            repo_name="${spec#*/}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "../${repo_name}"
          done
          git clone --depth 1 \
            "https://x-access-token:${CC_TOKEN}@github.com/jspinak/qontinui-cloud-control.git" \
            "../qontinui-cloud-control"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          # All non-path runtime deps are already pinned in requirements.txt;
          # path-deps (qontinui-schemas, qontinui-cloud-control) are installed
          # editable below. Together this satisfies every dep backend's
          # pyproject declares.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Force fresh editable install of qontinui-schemas before backend itself.
          # Without this, `pip install -e .` resolves the schemas path-dep against
          # pip's wheel cache (actions/cache@v3 above) and DOWNGRADES schemas to
          # whichever version was cached (e.g., 0.2.1) even though the cloned
          # ../../qontinui-schemas is at HEAD (0.4.0). Surfaces as
          # `ModuleNotFoundError: No module named 'qontinui_schemas.commands'`
          # whenever schemas ships a new sub-package.
          pip install --no-cache-dir -e ../../qontinui-schemas
          # `--no-deps` is critical: it prevents `pip install -e .` from
          # re-resolving (and downgrading) the editable schemas we just
          # installed. All backend deps are already satisfied above.
          if [ -f pyproject.toml ]; then pip install -e . --no-deps; fi
          pip install -e ../../qontinui-cloud-control

      - name: Run backend E2E tests
        working-directory: ./backend
        env:
          TESTING: 1
          ENVIRONMENT: test
        run: |
          pytest tests/test_integration_e2e.py -v --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Upload backend coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./backend/htmlcov/
          retention-days: 30

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./backend/test-results/
          retention-days: 30

  # Full 4-shard suite. Runs on direct push to main, on the nightly
  # schedule, and on workflow_dispatch — never on PR. The on-PR merge gate
  # is Spec CI (.github/workflows/spec-ci.yml); the Playwright E2E smoke job
  # that used to gate PRs here was retired 2026-05-25 once Spec CI gained a
  # default-on console-error invariant (see spec-ci/console-policy.ts) that
  # subsumed its last unique guarantee. This sharded suite remains the deeper
  # nightly/on-push backstop.
  frontend-tests:
    name: Frontend E2E Tests (shard ${{ matrix.shard }}/4)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      # Don't cancel sibling shards if one fails — we want the full failure
      # picture from every shard, not just the first one to die.
      fail-fast: false
      matrix:
        # Run the suite in 4 parallel shards. Each matrix entry gets its
        # own runner with its own ephemeral postgres + backend + frontend,
        # so there is no shared state between shards. Wall clock ≈
        # max(shard times), not sum. With ~309 failing tests at 60s each
        # under retries=0, single-shard wall clock was 5h+; 4-way sharding
        # brings that to ~1h15m.
        shard: [1, 2, 3, 4]
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Both backend pyproject.toml and frontend package.json have path
      # deps on these five sibling repos. Without this clone, `pip
      # install -e .` and `npm ci` fail with ENOENT.
      - name: Clone sibling dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC_TOKEN: ${{ secrets.web_ci_cloud_control_read }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
            "qontinui/ui-bridge" \
            "qontinui/qontinui-workflow-ui" \
            "qontinui/qontinui-workflow-utils" \
            "qontinui/qontinui-navigation" \
          ; do
            repo_name="${spec#*/}"
            target="../${repo_name}"
            echo "::group::Cloning ${spec} → ${target}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "${target}"
            echo "::endgroup::"
          done
          # cloud-control lives under jspinak/ and is private — needs PAT
          echo "::group::Cloning jspinak/qontinui-cloud-control → ../qontinui-cloud-control"
          git clone --depth 1 \
            "https://x-access-token:${CC_TOKEN}@github.com/jspinak/qontinui-cloud-control.git" \
            "../qontinui-cloud-control"
          echo "::endgroup::"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -e ../../qontinui-cloud-control

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      # Some alembic migrations (unify_runner_concepts onward) reference
      # the `runner` schema, which is created by
      # qontinui-web/init-scripts/01-create-runner-schema.sql in dev's
      # docker-entrypoint-initdb.d. CI service containers don't run
      # those init scripts, so create the schema explicitly.
      - name: Create runner schema
        env:
          PGPASSWORD: test_password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U test_user -d test_db -c "CREATE SCHEMA IF NOT EXISTS runner;"

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          alembic upgrade heads

      # The auth.setup.ts Playwright fixture logs in as the canonical dev
      # user defined in dev-credentials.json (see frontend/tests/e2e/test-credentials.ts).
      # Migrations only create empty tables; nothing else seeds users in CI.
      # create_admin.py is idempotent and pulls credentials from the same
      # source of truth (app.core.test_credentials.get_admin_credentials).
      - name: Create dev user for E2E auth setup
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          python create_admin.py

      - name: Run frontend E2E tests
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3001
        run: |
          npx playwright test --project=chromium --shard=${{ matrix.shard }}/4

      # Artifact names must be unique across matrix entries (actions/upload-artifact@v4
      # rejects collisions). Suffix with the shard index so each shard's
      # output uploads cleanly and can be downloaded independently.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results-shard-${{ matrix.shard }}
          path: frontend/test-results/
          retention-days: 30

      - name: Upload test artifacts (screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-shard-${{ matrix.shard }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  # The cross-browser-survey job lives in its own workflow file
  # (.github/workflows/cross-browser-survey.yml) so it isn't subject
  # to this workflow's `cancel-in-progress: true` (line 21) — the
  # slowest matrix entry (Mobile Chrome) takes ~30min and was being
  # cancelled mid-run by every push to main. See that file for
  # details.

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate test summary
        run: |
          echo "# E2E Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Tests: ${{ needs.backend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Tests: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Test reports and artifacts are available in the Actions artifacts section." >> $GITHUB_STEP_SUMMARY

      # Propagate shard/backend failures into this job's conclusion. Without
      # this, `if: always()` means Test Summary stays GREEN even when a
      # frontend shard or the backend job goes red, so push/nightly reds are
      # invisible on the required `Test Summary` check. We treat `skipped` as
      # OK so the on-PR case (where `frontend-tests` is skipped via its
      # `if: github.event_name != 'pull_request'` guard) does not fail the
      # summary — only a job that actually RAN and ended `failure`/`cancelled`
      # turns this red. `needs.<job>.result` for a matrix job aggregates
      # across shards: it is `failure` if ANY shard failed.
      - name: Fail if any needed job failed
        env:
          BACKEND_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend-tests.result }}
        run: |
          echo "backend-tests:  ${BACKEND_RESULT}"
          echo "frontend-tests: ${FRONTEND_RESULT}"
          status=0
          for result in "${BACKEND_RESULT}" "${FRONTEND_RESULT}"; do
            case "${result}" in
              failure|cancelled)
                echo "::error::A needed job concluded '${result}' — failing Test Summary."
                status=1
                ;;
              success|skipped|"")
                # success = passed; skipped = job's `if` guard excluded it
                # (e.g. frontend-tests on PRs); "" = no such dependency. All OK.
                ;;
              *)
                echo "::error::A needed job concluded unexpected status '${result}' — failing Test Summary."
                status=1
                ;;
            esac
          done
          exit "${status}"
