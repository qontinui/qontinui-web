name: E2E Integration Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # backend/pyproject.toml has path deps on ../../qontinui-schemas
      # and ../../qontinui; without these clones, `pip install -e .`
      # fails with ENOENT. qontinui-cloud-control is needed for the test
      # harness's side-effect import (see backend/tests/conftest.py).
      - name: Clone backend Python sibling deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
            "jspinak/qontinui-cloud-control" \
          ; do
            repo_name="${spec#*/}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "../${repo_name}"
          done

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -e ../../qontinui-cloud-control

      - name: Run backend E2E tests
        working-directory: ./backend
        env:
          TESTING: 1
          ENVIRONMENT: test
        run: |
          pytest tests/test_integration_e2e.py -v --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Upload backend coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./backend/htmlcov/
          retention-days: 30

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./backend/test-results/
          retention-days: 30

  frontend-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Both backend pyproject.toml and frontend package.json have path
      # deps on these five sibling repos. Without this clone, `pip
      # install -e .` and `npm ci` fail with ENOENT.
      - name: Clone sibling dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
            "qontinui/ui-bridge" \
            "qontinui/qontinui-workflow-ui" \
            "qontinui/qontinui-workflow-utils" \
            "qontinui/qontinui-navigation" \
            "jspinak/qontinui-cloud-control" \
          ; do
            repo_name="${spec#*/}"
            target="../${repo_name}"
            echo "::group::Cloning ${spec} → ${target}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "${target}"
            echo "::endgroup::"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -e ../../qontinui-cloud-control

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      # Some alembic migrations (unify_runner_concepts onward) reference
      # the `runner` schema, which is created by
      # qontinui-web/init-scripts/01-create-runner-schema.sql in dev's
      # docker-entrypoint-initdb.d. CI service containers don't run
      # those init scripts, so create the schema explicitly.
      - name: Create runner schema
        env:
          PGPASSWORD: test_password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U test_user -d test_db -c "CREATE SCHEMA IF NOT EXISTS runner;"

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          alembic upgrade heads

      - name: Run frontend E2E tests
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3001
        run: |
          npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results/
          retention-days: 30

      - name: Upload test artifacts (screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  integration-tests:
    name: Full Stack Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Same sibling deps as the frontend-tests job — both backend and
      # frontend installs need them.
      - name: Clone sibling dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
            "qontinui/ui-bridge" \
            "qontinui/qontinui-workflow-ui" \
            "qontinui/qontinui-workflow-utils" \
            "qontinui/qontinui-navigation" \
            "jspinak/qontinui-cloud-control" \
          ; do
            repo_name="${spec#*/}"
            target="../${repo_name}"
            echo "::group::Cloning ${spec} → ${target}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "${target}"
            echo "::endgroup::"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -e ../../qontinui-cloud-control

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          TESTING: 1
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          ACCESS_SECRET_KEY: test-access-secret-key-minimum-32-characters-required
          RESET_PASSWORD_SECRET_KEY: test-reset-password-secret-key-min-32-chars-required
          VERIFICATION_SECRET_KEY: test-verification-secret-key-min-32-chars-required
          ALGORITHM: HS256
          FRONTEND_URL: http://localhost:3000
          BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Run full integration tests
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3001
          API_BASE_URL: http://localhost:8000
        run: |
          npx playwright test --project=chromium

      - name: Upload full integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-integration-test-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, integration-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate test summary
        run: |
          echo "# E2E Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Tests: ${{ needs.backend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Tests: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Test reports and artifacts are available in the Actions artifacts section." >> $GITHUB_STEP_SUMMARY
