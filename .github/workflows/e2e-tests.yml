name: E2E Integration Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  # Run the full sharded E2E suite nightly. The on-PR smoke job is the
  # gating signal for merging; this scheduled run catches regressions the
  # smoke set doesn't cover, without ever blocking a PR.
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# Cancel in-progress runs when a newer commit lands on the same ref. Without
# this, every push or PR update spawns a fresh ~1h+ E2E run while the prior
# one keeps grinding — six concurrent 5h runs were observed in flight at
# once before this guard was added.
concurrency:
  group: e2e-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # backend/pyproject.toml has path deps on ../../qontinui-schemas
      # and ../../qontinui; without these clones, `pip install -e .`
      # fails with ENOENT. qontinui-cloud-control is needed for the test
      # harness's side-effect import (see backend/tests/conftest.py); it
      # lives under jspinak/ and is private, so default GITHUB_TOKEN
      # (scoped to qontinui-web) can't read it — use a dedicated PAT.
      - name: Clone backend Python sibling deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC_TOKEN: ${{ secrets.web_ci_cloud_control_read }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
          ; do
            repo_name="${spec#*/}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "../${repo_name}"
          done
          git clone --depth 1 \
            "https://x-access-token:${CC_TOKEN}@github.com/jspinak/qontinui-cloud-control.git" \
            "../qontinui-cloud-control"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Force fresh editable install of qontinui-schemas BEFORE `pip install -e .`
          # so the cached pip-wheel layer (actions/cache@v3 above) doesn't restore a
          # stale wheel from a prior version of schemas. Without this, `pip install -e .`
          # resolves the schemas path-dep against the pip cache and pulls whichever
          # version was last built, even though `develop = true` in backend's pyproject
          # asks for an editable install. Cost: ~1s rebuild; benefit: schemas always
          # reflects the cloned ../../qontinui-schemas HEAD state.
          pip install --no-cache-dir -e ../../qontinui-schemas
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -e ../../qontinui-cloud-control

      - name: Run backend E2E tests
        working-directory: ./backend
        env:
          TESTING: 1
          ENVIRONMENT: test
        run: |
          pytest tests/test_integration_e2e.py -v --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Upload backend coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./backend/htmlcov/
          retention-days: 30

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./backend/test-results/
          retention-days: 30

  # Smoke set runs on every PR. Gates merging. Single runner, no shard,
  # ~10 min including setup. `--grep` selects tests tagged `@smoke` plus
  # the auth.setup bootstrap (every authenticated test depends on its
  # storage state). Push-to-main, schedule, and workflow_dispatch run
  # the full sharded job below instead.
  frontend-tests-smoke:
    name: Frontend E2E Smoke Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Clone sibling dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC_TOKEN: ${{ secrets.web_ci_cloud_control_read }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
            "qontinui/ui-bridge" \
            "qontinui/qontinui-workflow-ui" \
            "qontinui/qontinui-workflow-utils" \
            "qontinui/qontinui-navigation" \
          ; do
            repo_name="${spec#*/}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "../${repo_name}"
          done
          git clone --depth 1 \
            "https://x-access-token:${CC_TOKEN}@github.com/jspinak/qontinui-cloud-control.git" \
            "../qontinui-cloud-control"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -e ../../qontinui-cloud-control

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Create runner schema
        env:
          PGPASSWORD: test_password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U test_user -d test_db -c "CREATE SCHEMA IF NOT EXISTS runner;"

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          alembic upgrade heads

      - name: Create dev user for E2E auth setup
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          python create_admin.py

      # auth.setup runs unconditionally (it's a `dependencies: ["setup"]`
      # of the chromium project — see frontend/playwright.config.ts), so
      # the cascade infrastructure (login + storage state) is verified on
      # every PR. `--grep "@smoke"` filters the chromium project itself
      # to tests tagged `@smoke` in their title:
      #   test('does X @smoke', async ({ page }) => { ... })
      # `--pass-with-no-tests` tolerates the initial "no @smoke yet" state
      # — Playwright would otherwise error on zero matches. Tag tests as
      # they prove reliable; the smoke set grows organically.
      - name: Run frontend E2E smoke tests
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3001
        run: |
          npx playwright test --project=chromium --grep "@smoke" --pass-with-no-tests

      - name: Upload smoke test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  # Full 4-shard suite. Runs on direct push to main, on the nightly
  # schedule, and on workflow_dispatch — never on PR. PR runs use the
  # smoke job above.
  frontend-tests:
    name: Frontend E2E Tests (shard ${{ matrix.shard }}/4)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      # Don't cancel sibling shards if one fails — we want the full failure
      # picture from every shard, not just the first one to die.
      fail-fast: false
      matrix:
        # Run the suite in 4 parallel shards. Each matrix entry gets its
        # own runner with its own ephemeral postgres + backend + frontend,
        # so there is no shared state between shards. Wall clock ≈
        # max(shard times), not sum. With ~309 failing tests at 60s each
        # under retries=0, single-shard wall clock was 5h+; 4-way sharding
        # brings that to ~1h15m.
        shard: [1, 2, 3, 4]
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Both backend pyproject.toml and frontend package.json have path
      # deps on these five sibling repos. Without this clone, `pip
      # install -e .` and `npm ci` fail with ENOENT.
      - name: Clone sibling dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC_TOKEN: ${{ secrets.web_ci_cloud_control_read }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
            "qontinui/ui-bridge" \
            "qontinui/qontinui-workflow-ui" \
            "qontinui/qontinui-workflow-utils" \
            "qontinui/qontinui-navigation" \
          ; do
            repo_name="${spec#*/}"
            target="../${repo_name}"
            echo "::group::Cloning ${spec} → ${target}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "${target}"
            echo "::endgroup::"
          done
          # cloud-control lives under jspinak/ and is private — needs PAT
          echo "::group::Cloning jspinak/qontinui-cloud-control → ../qontinui-cloud-control"
          git clone --depth 1 \
            "https://x-access-token:${CC_TOKEN}@github.com/jspinak/qontinui-cloud-control.git" \
            "../qontinui-cloud-control"
          echo "::endgroup::"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -e ../../qontinui-cloud-control

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      # Some alembic migrations (unify_runner_concepts onward) reference
      # the `runner` schema, which is created by
      # qontinui-web/init-scripts/01-create-runner-schema.sql in dev's
      # docker-entrypoint-initdb.d. CI service containers don't run
      # those init scripts, so create the schema explicitly.
      - name: Create runner schema
        env:
          PGPASSWORD: test_password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U test_user -d test_db -c "CREATE SCHEMA IF NOT EXISTS runner;"

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          alembic upgrade heads

      # The auth.setup.ts Playwright fixture logs in as the canonical dev
      # user (josh@qontinui.io / dev123 — see frontend/tests/e2e/test-credentials.ts).
      # Migrations only create empty tables; nothing else seeds users in CI.
      # create_admin.py is idempotent and pulls credentials from the same
      # source of truth (app.core.test_credentials.get_admin_credentials).
      - name: Create dev user for E2E auth setup
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          python create_admin.py

      - name: Run frontend E2E tests
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3001
        run: |
          npx playwright test --project=chromium --shard=${{ matrix.shard }}/4

      # Artifact names must be unique across matrix entries (actions/upload-artifact@v4
      # rejects collisions). Suffix with the shard index so each shard's
      # output uploads cleanly and can be downloaded independently.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results-shard-${{ matrix.shard }}
          path: frontend/test-results/
          retention-days: 30

      - name: Upload test artifacts (screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-shard-${{ matrix.shard }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  # The cross-browser-survey job lives in its own workflow file
  # (.github/workflows/cross-browser-survey.yml) so it isn't subject
  # to this workflow's `cancel-in-progress: true` (line 21) — the
  # slowest matrix entry (Mobile Chrome) takes ~30min and was being
  # cancelled mid-run by every push to main. See that file for
  # details.

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate test summary
        run: |
          echo "# E2E Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Tests: ${{ needs.backend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Tests: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Test reports and artifacts are available in the Actions artifacts section." >> $GITHUB_STEP_SUMMARY
