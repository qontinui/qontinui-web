name: E2E Integration Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    # merge-candidate/** refs are pushed by coord's autonomous merge scheduler
    # (plan 2026-06-06-coord-ci-runner-autonomous-green-merge, Phase 4). The
    # required E2E gate must run on them so a candidate proposal gets a real
    # CI verdict instead of hanging in awaiting-ci. Validation-only; no deploy.
    branches:
      - main
      - develop
      - 'merge-candidate/**'
      - 'merge-candidate-spec/**'
      - 'merge-candidate-batch/**'
  # Run the full sharded E2E suite nightly. The on-PR smoke job is the
  # gating signal for merging; this scheduled run catches regressions the
  # smoke set doesn't cover, without ever blocking a PR.
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# Cancel in-progress runs when a newer commit lands on the same ref. Without
# this, every push or PR update spawns a fresh ~1h+ E2E run while the prior
# one keeps grinding — six concurrent 5h runs were observed in flight at
# once before this guard was added.
concurrency:
  group: e2e-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # backend/pyproject.toml has path deps on ../../qontinui-schemas
      # and ../../qontinui; without these clones, `pip install -e .`
      # fails with ENOENT. qontinui-cloud-control is needed for the test
      # harness's side-effect import (see backend/tests/conftest.py); it is
      # now AGPL/public under qontinui/, cloned the same way as the others.
      - name: Clone backend Python sibling deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
            "qontinui/qontinui-cloud-control" \
          ; do
            repo_name="${spec#*/}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "../${repo_name}"
          done

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          # All non-path runtime deps are already pinned in requirements.txt;
          # path-deps (qontinui-schemas, qontinui-cloud-control) are installed
          # editable below. Together this satisfies every dep backend's
          # pyproject declares.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Force fresh editable install of qontinui-schemas before backend itself.
          # Without this, `pip install -e .` resolves the schemas path-dep against
          # pip's wheel cache (actions/cache@v3 above) and DOWNGRADES schemas to
          # whichever version was cached (e.g., 0.2.1) even though the cloned
          # ../../qontinui-schemas is at HEAD (0.4.0). Surfaces as
          # `ModuleNotFoundError: No module named 'qontinui_schemas.commands'`
          # whenever schemas ships a new sub-package.
          pip install --no-cache-dir -e ../../qontinui-schemas
          # `--no-deps` is critical: it prevents `pip install -e .` from
          # re-resolving (and downgrading) the editable schemas we just
          # installed. All backend deps are already satisfied above.
          if [ -f pyproject.toml ]; then pip install -e . --no-deps; fi
          pip install -e ../../qontinui-cloud-control

      - name: Run backend E2E tests
        working-directory: ./backend
        env:
          TESTING: 1
          ENVIRONMENT: test
        run: |
          pytest tests/test_integration_e2e.py -v --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Upload backend coverage HTML
        uses: actions/upload-artifact@v5
        with:
          name: backend-coverage-report
          path: ./backend/htmlcov/
          retention-days: 30

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-test-results
          path: ./backend/test-results/
          retention-days: 30

  # Full 4-shard suite. Runs on direct push to main, on the nightly
  # schedule, and on workflow_dispatch — never on PR. The on-PR merge gate
  # is Spec CI (.github/workflows/spec-ci.yml); the Playwright E2E smoke job
  # that used to gate PRs here was retired 2026-05-25 once Spec CI gained a
  # default-on console-error invariant (see spec-ci/console-policy.ts) that
  # subsumed its last unique guarantee. This sharded suite remains the deeper
  # nightly/on-push backstop.
  frontend-tests:
    name: Frontend E2E Tests (shard ${{ matrix.shard }}/4)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      # Don't cancel sibling shards if one fails — we want the full failure
      # picture from every shard, not just the first one to die.
      fail-fast: false
      matrix:
        # Run the suite in 4 parallel shards. Each matrix entry gets its
        # own runner with its own ephemeral postgres + backend + frontend,
        # so there is no shared state between shards. Wall clock ≈
        # max(shard times), not sum. With ~309 failing tests at 60s each
        # under retries=0, single-shard wall clock was 5h+; 4-way sharding
        # brings that to ~1h15m.
        shard: [1, 2, 3, 4]
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Both backend pyproject.toml and frontend package.json have path
      # deps on these five sibling repos. Without this clone, `pip
      # install -e .` and `npm ci` fail with ENOENT.
      - name: Clone sibling dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for spec in \
            "qontinui/qontinui-schemas" \
            "qontinui/qontinui" \
            "qontinui/ui-bridge" \
            "qontinui/qontinui-workflow-ui" \
            "qontinui/qontinui-workflow-utils" \
            "qontinui/qontinui-navigation" \
            "qontinui/qontinui-cloud-control" \
          ; do
            repo_name="${spec#*/}"
            target="../${repo_name}"
            echo "::group::Cloning ${spec} → ${target}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "${target}"
            echo "::endgroup::"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -e ../../qontinui-cloud-control

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      # Some alembic migrations (unify_runner_concepts onward) reference
      # the `runner` schema, which is created by
      # qontinui-web/init-scripts/01-create-runner-schema.sql in dev's
      # docker-entrypoint-initdb.d. CI service containers don't run
      # those init scripts, so create the schema explicitly.
      - name: Create runner schema
        env:
          PGPASSWORD: test_password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U test_user -d test_db -c "CREATE SCHEMA IF NOT EXISTS runner;"

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          TESTING: '1'
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-chars-required
          STORAGE_BACKEND: local
          REDIS_ENABLED: 'false'
        run: |
          alembic upgrade heads

      # Hermetic auth (mirrors spec-ci.yml + style-gate.yml — the ONE
      # canonical CI auth contract): mint a run-local RS256 id token + JWKS,
      # point the backend's Cognito verifier at the local issuer, and let
      # auth.setup.ts lane 1 (QONTINUI_TEST_ID_TOKEN) seed it. The backend
      # JIT-provisions the ci-bot user on the fixture's first authed probe —
      # no DB seeding step. This replaces the deleted create_admin.py step:
      # the local-password stack was retired in #342 (Cognito sole auth) and
      # this workflow was never ported, which red-failed every main run from
      # 2026-05-30 onward at "Create dev user for E2E auth setup".
      - name: Mint local id token + serve JWKS
        working-directory: ./backend
        run: |
          set -euo pipefail
          # Mint as the canonical dev user (dev-credentials.json — single
          # source of truth; the drift guard forbids hardcoding it). The
          # global-setup seeder creates this user as a superuser shell row
          # owning the seeded project/snapshots, and cognito_provision's
          # link-by-verified-email arm stamps the token's sub onto that row
          # on first authed probe. Minting any OTHER email (e.g. spec-ci's
          # empty-account ci-bot) JIT-provisions a second, data-less,
          # non-superuser user — every data-dependent spec then renders
          # empty states ("No projects yet") and admin-gated suites 403.
          EMAIL=$(python -c "import json; print(json.load(open('../dev-credentials.json'))['email'])")
          TOKEN=$(python scripts/spec_ci_local_idp.py \
            --issuer "http://127.0.0.1:8770" \
            --audience spec-ci-local \
            --email "$EMAIL" \
            --out-dir /tmp/e2e-idp)
          echo "QONTINUI_TEST_ID_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          (cd /tmp/e2e-idp && python -m http.server 8770 --bind 127.0.0.1 > /tmp/idp.log 2>&1 &)
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:8770/.well-known/jwks.json > /dev/null; then
              echo "local JWKS up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8770/.well-known/jwks.json > /dev/null

      - name: Run frontend E2E tests
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3001
          # Hermetic-auth backend config. global-setup.ts spawns uvicorn with
          # `...process.env`, so these reach the backend's Cognito verifier:
          # it trusts the run-local issuer above and fetches its JWKS from
          # 127.0.0.1:8770. Values mirror spec-ci.yml.
          COGNITO_USER_POOL_ID: spec-ci-local-pool
          COGNITO_ISSUER: http://127.0.0.1:8770
          COGNITO_ALLOWED_AUDIENCES: spec-ci-local
          # Authenticate the backend's GitHub Releases fetch
          # (backend/app/api/v1/endpoints/releases.py reads GITHUB_TOKEN and
          # sends it as a Bearer). Shared Actions runner IPs exhaust the 60/hr
          # anonymous api.github.com limit, silently degrading the release
          # payload to an empty asset list and timing out download-page
          # assertions (runs 29859706423 + 29696362417). The token lifts the
          # limit to 5000/hr; read-only, public-repo metadata only.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx playwright test --project=chromium --shard=${{ matrix.shard }}/4

      # Artifact names must be unique across matrix entries (actions/upload-artifact@v4
      # rejects collisions). Suffix with the shard index so each shard's
      # output uploads cleanly and can be downloaded independently.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-test-results-shard-${{ matrix.shard }}
          path: frontend/test-results/
          retention-days: 30

      - name: Upload test artifacts (screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-artifacts-shard-${{ matrix.shard }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  # The cross-browser-survey job lives in its own workflow file
  # (.github/workflows/cross-browser-survey.yml) so it isn't subject
  # to this workflow's `cancel-in-progress: true` (line 21) — the
  # slowest matrix entry (Mobile Chrome) takes ~30min and was being
  # cancelled mid-run by every push to main. See that file for
  # details.

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Generate test summary
        run: |
          echo "# E2E Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Tests: ${{ needs.backend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Tests: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Test reports and artifacts are available in the Actions artifacts section." >> $GITHUB_STEP_SUMMARY

      # Propagate shard/backend failures into this job's conclusion. Without
      # this, `if: always()` means Test Summary stays GREEN even when a
      # frontend shard or the backend job goes red, so push/nightly reds are
      # invisible on the required `Test Summary` check. We treat `skipped` as
      # OK so the on-PR case (where `frontend-tests` is skipped via its
      # `if: github.event_name != 'pull_request'` guard) does not fail the
      # summary — only a job that actually RAN and ended `failure`/`cancelled`
      # turns this red. `needs.<job>.result` for a matrix job aggregates
      # across shards: it is `failure` if ANY shard failed.
      - name: Fail if any needed job failed
        env:
          BACKEND_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend-tests.result }}
        run: |
          echo "backend-tests:  ${BACKEND_RESULT}"
          echo "frontend-tests: ${FRONTEND_RESULT}"
          status=0
          for result in "${BACKEND_RESULT}" "${FRONTEND_RESULT}"; do
            case "${result}" in
              failure|cancelled)
                echo "::error::A needed job concluded '${result}' — failing Test Summary."
                status=1
                ;;
              success|skipped|"")
                # success = passed; skipped = job's `if` guard excluded it
                # (e.g. frontend-tests on PRs); "" = no such dependency. All OK.
                ;;
              *)
                echo "::error::A needed job concluded unexpected status '${result}' — failing Test Summary."
                status=1
                ;;
            esac
          done
          exit "${status}"
