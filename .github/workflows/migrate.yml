name: Apply Migrations to RDS

# Echo the coord gate-executor dispatch_id (when present) so the dispatcher
# can find this run by name — the dispatches API returns 204 with no run id.
# On push/schedule the `inputs` context is empty (missing inputs evaluate to
# '' in expressions), so this degrades to the plain base name.
run-name: "Apply Migrations to RDS${{ inputs.dispatch_id != '' && format(' [dispatch:{0}]', inputs.dispatch_id) || '' }}"

# Auto-runs `alembic upgrade head` against the staging canonical DB by building
# the migrator image and dispatching the ECS task. The migrator image is the
# one defined in qontinui-stack/migrator/ — it embeds the full alembic chain
# from backend/alembic + the qontinui-schemas dependency at build time.
#
# Triggers:
#   - push to main when alembic chain or backend pyproject changes
#   - workflow_dispatch for manual catch-up runs (schemas-only drift, etc.)
#   - nightly schedule so schema drift never accumulates more than ~24h
#
# The migrator entrypoint is idempotent — if the DB is already at head it
# exits 0 without writing. Cost of an unnecessary run is ~3 min CI + a few
# seconds of Fargate; cheaper than a drift incident.
#
# Memory: proj_staging_pg_schema_drift_2026-05-22 — the manual-only model
# this workflow replaces silently broke /coord/status + the multi-tenant
# audit INSERT path. Auto-deploy of migrations is the documented fix.
#
# FORWARD-ONLY — NOT covered by deploy auto-rollback. The post-deploy
# auto-rollback in deploy-web.yml (and verify-frontend-deploy.yml) reverts the
# APPLICATION (ECS task-def / Vercel alias) to a prior revision, but it does
# NOT and MUST NOT revert the schema: alembic downgrades are not data-safe
# (dropped columns/tables lose data). Treat migrations as forward-only —
# additive + backward-compatible with the currently-live app so a rolled-back
# app keeps working against the new schema — and fix forward, never auto-revert
# a migration. (Do not add a naive `alembic downgrade` rollback step here.)

on:
  push:
    branches: [main]
    paths:
      - 'backend/alembic/**'
      - 'backend/pyproject.toml'
      - 'backend/poetry.lock'
  schedule:
    - cron: '0 3 * * *'  # daily 03:00 UTC catches schemas-only drifts
  workflow_dispatch:
    inputs:
      # Coord's deploy/migrate gate executor (plan
      # 2026-06-10-coord-deploy-migrate-executor) dispatches this workflow with
      # dispatch_id and correlates the spawned run via the run-name echo above.
      # Must stay DECLARED: GitHub 422-rejects a dispatch carrying undeclared
      # inputs. Optional with a default, so manual/empty dispatches still work.
      dispatch_id:
        description: "Coord gate-executor correlation id — echoed in run-name so the dispatcher can find this run (leave empty for manual runs)"
        required: false
        default: ""

# Migrator runs as a one-shot ECS task; concurrent runs are safe (alembic
# acquires its own advisory lock on the DB) but pointless. Cancel-in-progress
# is OFF: cancelling a migration mid-flight risks half-applied DDL that
# alembic's advisory lock can't roll back. Pending runs queue and the latest
# wins naturally (alembic stamps head, intermediate runs no-op).
concurrency:
  group: migrate
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: qontinui-migrator
  IMAGE_TAG: staging
  ECS_CLUSTER: ${{ secrets.STAGING_ECS_CLUSTER }}
  ECS_TASK_FAMILY: qontinui-staging-migrator
  ECS_SUBNETS: ${{ secrets.STAGING_PRIVATE_SUBNET_IDS }}
  ECS_SECURITY_GROUP: ${{ secrets.STAGING_CLIENT_SG_ID }}

jobs:
  migrate:
    name: Build, push, run migrator
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      # issues: write powers the page-on-failure step below (create/comment a
      # tracking issue when the migration apply fails).
      issues: write

    steps:
      - name: Check out qontinui-web
        uses: actions/checkout@v5
        with:
          # Full history so the DAG-snapshot step can resolve each migration
          # file's INTRODUCING commit (`git log --diff-filter=A`) into
          # `authored_in_sha` — the join key coord's lifecycle view uses against
          # `commit_lineage`. Shallow (default depth-1) would leave it null.
          fetch-depth: 0

      # ── Φ_Schema declared-side chain-head attestation ─────────────────────
      # coord's schema observer can only see the ACTUAL side (the stamped
      # alembic_version row) from inside ECS — the authored migration DAG is
      # a designed blind spot it reports as drift_class `unknown` forever.
      # This step is the producer half: compute the authored head(s) from the
      # migration files (stdlib scan, no DB, no alembic install) and POST them
      # to coord (bearer-gated, fail-closed server-side). Runs BEFORE the
      # apply and best-effort: the attestation reflects the AUTHORED head
      # as-merged on main regardless of apply outcome, so authored-not-applied
      # shows up as coord's honest `pending` rather than being masked by
      # attest-only-on-success. The nightly schedule re-attests (self-healing
      # if a POST was ever missed). Any failure here warns and the migration
      # proceeds — attestation observes, it does not gate.
      - name: Attest declared alembic chain head to coord
        continue-on-error: true
        env:
          COORD_INGEST_TOKEN: ${{ secrets.COORD_INGEST_TOKEN }}
        run: |
          set -uo pipefail
          HEADS_LINE=$(python3 - <<'PY'
          import os, re
          revs, parents = set(), set()
          d = "backend/alembic/versions"
          for f in os.listdir(d):
              if not f.endswith(".py"):
                  continue
              s = open(os.path.join(d, f), encoding="utf-8").read()
              m = re.search(r"^revision(?::\s*str)?\s*=\s*[\"']([^\"']+)", s, re.M)
              if m:
                  revs.add(m.group(1))
              # `[^=\n]` (NOT `[^=]`) so the assignment's `=` must be on the
              # SAME line. A negated class matches newlines, so `[^=]*` let a
              # docstring sentence starting "down_revision ..." greedily bridge
              # across lines to the next `=`, capturing revision-ids mentioned in
              # the prose (including the head itself) → heads=0 → silent skip →
              # coord's pre-deploy drift gate wedged (2026-06-15 13h-outage root
              # cause).
              for dm in re.finditer(r"^down_revision[^=\n]*=\s*(.+)", s, re.M):
                  for tok in re.findall(r"[\"']([^\"']+)[\"']", dm.group(1)):
                      parents.add(tok)
          heads = sorted(revs - parents)
          print(f"{','.join(heads)} {len(heads)}")
          PY
          )
          HEADS="${HEADS_LINE% *}"
          COUNT="${HEADS_LINE##* }"
          if [ -z "${HEADS:-}" ] || [ "${COUNT:-0}" = "0" ]; then
            # LOUD, not silent: a missing/zero head leaves coord's chain-head
            # attestation stale → coord_alembic_drift stuck Pending → EVERY coord
            # deploy blocks at the pre-deploy drift gate (the 2026-06-15 13h
            # outage). Surface it as an error annotation so it cannot hide.
            echo "::error::could not compute the authored alembic head (HEADS='${HEADS:-}' COUNT='${COUNT:-0}') — chain-head attestation SKIPPED; coord deploys will wedge on alembic-drift until fixed"
            exit 0
          fi
          echo "authored chain head(s): $HEADS (count=$COUNT)"
          BODY=$(python3 -c "
          import json, os, sys
          print(json.dumps({
              'repo': 'qontinui/qontinui-web',
              'chain_head': sys.argv[1],
              'head_count': int(sys.argv[2]),
              'source_sha': os.environ.get('GITHUB_SHA'),
          }))" "$HEADS" "$COUNT")
          CODE=$(curl -s -o /tmp/attest_resp -w '%{http_code}' --max-time 20 \
            -X POST "https://coord.qontinui.io/coord/schema/chain-head" \
            -H "Authorization: Bearer $COORD_INGEST_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$BODY" || echo 000)
          if [ "$CODE" = "200" ]; then
            echo "attested: $(head -c 200 /tmp/attest_resp)"
          else
            echo "::warning::chain-head attestation returned $CODE (best-effort, migration proceeds): $(head -c 300 /tmp/attest_resp 2>/dev/null)"
          fi
          exit 0

      # ── Φ_Schema authored-DAG snapshot (superset of chain-head) ───────────
      # Phase 3 of the coord migration/drift/provenance plan. The chain-head
      # step above POSTs only the head(s); coord now also wants the FULL
      # authored DAG so it can render per-revision provenance (parents, the
      # objects each revision touches, reversibility, merge points). Same
      # stdlib-only scan, same bearer, same fail-open posture — observes, never
      # gates. Upserts one row per revision into coord.migration_revisions.
      - name: Report alembic DAG snapshot to coord
        continue-on-error: true
        env:
          COORD_INGEST_TOKEN: ${{ secrets.COORD_INGEST_TOKEN }}
        run: |
          set -uo pipefail
          # Map each version file to its INTRODUCING commit (the one that ADDED
          # it) + that commit's date, in ONE git pass (newest-first). Powers
          # per-revision authored_in_sha / authored_at below. Best-effort: a
          # shallow clone or git failure yields an empty map → authored_in_sha
          # stays null (the prior behavior), never a hard fail.
          git log --diff-filter=A --name-only --format='C|%H|%cI' \
            -- backend/alembic/versions/ > /tmp/addmap.txt 2>/dev/null || : > /tmp/addmap.txt
          python3 - <<'PY' > /tmp/snap.json
          import json, os, re

          D = "backend/alembic/versions"
          GITHUB_SHA = os.environ.get("GITHUB_SHA")

          # filename (basename) -> (introducing_sha, committer_date_iso). Parsed
          # from the `git log --diff-filter=A --name-only` dump above: each
          # `C|<sha>|<date>` line sets the current commit, each subsequent path
          # line attributes that file's ADD. Newest-first, so the FIRST add seen
          # per file wins (the most recent add if a file was ever re-added).
          add_map = {}
          try:
              cur_sha = cur_date = None
              with open("/tmp/addmap.txt", encoding="utf-8") as fh:
                  for line in fh:
                      line = line.rstrip("\n")
                      if line.startswith("C|"):
                          parts = line.split("|", 2)
                          cur_sha = parts[1] if len(parts) > 1 else None
                          cur_date = parts[2] if len(parts) > 2 else None
                      elif line.endswith(".py") and cur_sha:
                          base = os.path.basename(line)
                          add_map.setdefault(base, (cur_sha, cur_date))
          except OSError:
              add_map = {}


          def quoted_tokens(rhs):
              return re.findall(r"[\"']([^\"']+)[\"']", rhs)


          def parse_down_revisions(src):
              # Capture the RHS of the FIRST `down_revision = ...`. Handles
              # None -> [], a single id, and a tuple ('a','b'). The optional
              # `: str | ...` annotation is tolerated by anchoring on `=`.
              m = re.search(r"^down_revision[^=\n]*=\s*(.+)$", src, re.M)
              if not m:
                  return []
              return quoted_tokens(m.group(1))


          def parse_revision(src):
              m = re.search(r"^revision(?::\s*str)?\s*=\s*[\"']([^\"']+)", src, re.M)
              return m.group(1) if m else None


          def block_after(src, header_regex):
              # Return the source from the matched def header to the next
              # top-level `def ` (or EOF). Good enough for our flat migration
              # files.
              m = re.search(header_regex, src, re.M)
              if not m:
                  return ""
              start = m.end()
              nxt = re.search(r"^def ", src[start:], re.M)
              return src[start: start + nxt.start()] if nxt else src[start:]


          def parse_reversible(src):
              body = block_after(src, r"^def downgrade\s*\(")
              # Reversible iff the downgrade body actually does DDL (`op.`),
              # i.e. it is not just pass / comments / `...`.
              return bool(re.search(r"\bop\.", body))


          def parse_objects_touched(src):
              body = block_after(src, r"^def upgrade\s*\(")
              objs = []
              for name in re.findall(r"op\.create_table\(\s*[\"']([^\"']+)", body):
                  objs.append({"op": "created", "object_type": "table", "name": name})
              for name in re.findall(r"op\.drop_table\(\s*[\"']([^\"']+)", body):
                  objs.append({"op": "dropped", "object_type": "table", "name": name})
              for name in re.findall(r"op\.create_index\(\s*[\"']([^\"']+)", body):
                  objs.append({"op": "created", "object_type": "index", "name": name})
              for name in re.findall(r"op\.drop_index\(\s*[\"']([^\"']+)", body):
                  objs.append({"op": "dropped", "object_type": "index", "name": name})
              # add_column: best-effort grab of the sa.Column("c") first arg in
              # the same call. If not easily grabbable, skip (empty is fine).
              for chunk in re.findall(r"op\.add_column\((.*?)\)\s*$", body, re.M | re.S):
                  cm = re.search(r"sa\.Column\(\s*[\"']([^\"']+)", chunk)
                  if cm:
                      objs.append(
                          {"op": "created", "object_type": "column", "name": cm.group(1)}
                      )
              return objs


          revisions = []
          try:
              files = sorted(f for f in os.listdir(D) if f.endswith(".py"))
          except OSError:
              files = []
          for f in files:
              try:
                  src = open(os.path.join(D, f), encoding="utf-8").read()
                  rev = parse_revision(src)
                  if not rev:
                      continue
                  downs = parse_down_revisions(src)
                  authored_in_sha, authored_at = add_map.get(f, (None, None))
                  revisions.append({
                      "revision": rev,
                      "down_revisions": downs,
                      "objects_touched": parse_objects_touched(src),
                      "reversible": parse_reversible(src),
                      "is_merge_point": len(downs) > 1,
                      "authored_in_sha": authored_in_sha,
                      "authored_at": authored_at,
                  })
              except Exception as e:  # best-effort — never crash the step
                  print(f"# skip {f}: {e}")

          print(json.dumps({
              "repo": "qontinui/qontinui-web",
              "source_sha": GITHUB_SHA,
              "revisions": revisions,
          }))
          PY
          N=$(python3 -c "import json;print(len(json.load(open('/tmp/snap.json'))['revisions']))" 2>/dev/null || echo 0)
          if [ "${N:-0}" = "0" ]; then
            echo "::warning::DAG snapshot parsed 0 revisions — skipping (best-effort)"
            exit 0
          fi
          echo "DAG snapshot: $N revisions"
          CODE=$(curl -s -o /tmp/snap_resp -w '%{http_code}' --max-time 20 \
            -X POST "https://coord.qontinui.io/coord/schema/revisions-snapshot" \
            -H "Authorization: Bearer $COORD_INGEST_TOKEN" \
            -H 'Content-Type: application/json' \
            -d @/tmp/snap.json || echo 000)
          if [ "$CODE" = "200" ]; then
            echo "snapshot reported: $(head -c 200 /tmp/snap_resp)"
          else
            echo "::warning::revisions-snapshot returned $CODE (best-effort, migration proceeds): $(head -c 300 /tmp/snap_resp 2>/dev/null)"
          fi
          exit 0

      # The migrator Dockerfile uses qontinui-root as build context (one
      # level up from any sibling repo's checkout). Sibling-checkout pattern
      # mirrors backend-deploy-production.yml and the runner CI.
      - name: Check out qontinui-stack + qontinui-schemas siblings
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone --depth 1 https://github.com/qontinui/qontinui-stack.git
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git
        shell: bash

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "uri=$REGISTRY/${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "${ECR_REPOSITORY}" \
            --region "${AWS_REGION}" >/dev/null 2>&1 \
          || aws ecr create-repository \
            --repository-name "${ECR_REPOSITORY}" \
            --region "${AWS_REGION}" \
            --image-scanning-configuration scanOnPush=true >/dev/null

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${{ steps.ecr.outputs.registry }}"

      # Build context = parent of qontinui-web checkout (i.e. the directory
      # containing qontinui-web/, qontinui-stack/, qontinui-schemas/). The
      # Dockerfile COPYs from qontinui-web/backend/{alembic,app}/ and from
      # qontinui-schemas/ relative to that context.
      - name: Build migrator image
        working-directory: ${{ github.workspace }}/..
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f qontinui-stack/migrator/Dockerfile \
            -t "${{ steps.ecr.outputs.uri }}" \
            -t "${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}" \
            --load \
            .

      - name: Push migrator image
        run: |
          docker push "${{ steps.ecr.outputs.uri }}"
          docker push "${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"

      # Register a fresh task-def revision pinned to THIS run's SHA image and
      # run that revision explicitly. Do NOT rely on the family's latest
      # revision pointing at a current image: on 2026-05-23 the live
      # qontinui-staging-migrator task-def had drifted to a pinned SHA tag
      # (`qontinui-migrator:721ebf8`, pre-`pair_codes_table`) while this
      # workflow dutifully pushed fresh `:staging` images that run-task never
      # used. The migrator silently no-op'd ("DB already at head") for a full
      # day, stranding staging at `coord_session_substrate` and 500ing the
      # pair-codes mint endpoint. Pinning the just-pushed SHA here makes the
      # migrate run self-sufficient and immune to task-def image drift —
      # mirrors staging-web-deploy.yml's deploy step.
      - name: Register task-def revision (fresh SHA image)
        id: taskdef
        run: |
          NEW_IMAGE="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          aws ecs describe-task-definition --task-definition "${ECS_TASK_FAMILY}" \
            --region "${AWS_REGION}" --query 'taskDefinition' --output json > td.json
          python3 - "$NEW_IMAGE" <<'PY'
          import json, sys
          new_image = sys.argv[1]
          td = json.load(open("td.json"))
          for c in td["containerDefinitions"]:
              if "qontinui-migrator" in c.get("image", ""):
                  c["image"] = new_image
          for k in ("taskDefinitionArn", "revision", "status", "requiresAttributes",
                    "compatibilities", "registeredAt", "registeredBy", "deregisteredAt"):
              td.pop(k, None)
          json.dump(td, open("td-new.json", "w"))
          PY
          NEW_TD=$(aws ecs register-task-definition --cli-input-json file://td-new.json \
            --region "${AWS_REGION}" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered $NEW_TD (image $NEW_IMAGE)"
          echo "arn=$NEW_TD" >> "$GITHUB_OUTPUT"

      - name: Run migrator task
        id: runtask
        run: |
          # Convert comma-separated subnet list into JSON array literal for
          # the awsvpcConfiguration argument. STAGING_PRIVATE_SUBNET_IDS is
          # stored as e.g. "subnet-aaaa,subnet-bbbb".
          SUBNETS_JSON=$(echo "${ECS_SUBNETS}" | python3 -c 'import sys,json; print(json.dumps([s.strip() for s in sys.stdin.read().split(",") if s.strip()]))')

          TASK_ARN=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --task-definition "${{ steps.taskdef.outputs.arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=${SUBNETS_JSON},securityGroups=[${ECS_SECURITY_GROUP}],assignPublicIp=DISABLED}" \
            --started-by "github-actions-${GITHUB_RUN_ID}" \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ -z "${TASK_ARN}" ] || [ "${TASK_ARN}" = "None" ]; then
            echo "::error::run-task returned no taskArn"
            exit 1
          fi
          echo "task_arn=${TASK_ARN}" >> "$GITHUB_OUTPUT"
          echo "Started ${TASK_ARN}"

      - name: Wait for task to stop
        run: |
          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${{ steps.runtask.outputs.task_arn }}"

      - name: Report exit code + tail logs
        run: |
          TASK_DESC=$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${{ steps.runtask.outputs.task_arn }}" \
            --query 'tasks[0]')

          EXIT_CODE=$(echo "$TASK_DESC" | python3 -c 'import sys,json; t=json.load(sys.stdin); c=t.get("containers",[{}])[0]; print(c.get("exitCode") if c.get("exitCode") is not None else "null")')
          STOP_REASON=$(echo "$TASK_DESC" | python3 -c 'import sys,json; t=json.load(sys.stdin); print(t.get("stoppedReason") or "")')

          echo "exitCode=${EXIT_CODE}"
          echo "stoppedReason=${STOP_REASON}"

          # CloudWatch logs (last 100 events) for diagnostic capture in the
          # workflow run output. The log group + stream naming is
          # /ecs/qontinui-staging/migrator + migrator/migrator/<task-id>.
          TASK_ID=$(echo "${{ steps.runtask.outputs.task_arn }}" | awk -F/ '{print $NF}')
          aws logs get-log-events \
            --log-group-name "/ecs/qontinui-staging/migrator" \
            --log-stream-name "migrator/migrator/${TASK_ID}" \
            --limit 100 \
            --query 'events[].message' \
            --output text 2>/dev/null \
            || echo "(log stream not yet flushed)"

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "::error::Migrator exited with code ${EXIT_CODE} (reason: ${STOP_REASON})"
            exit 1
          fi

      # ── Report the migration apply to coord (best-effort) ─────────────────
      # Phase 3 provenance: after the migrator one-shot succeeds (the step
      # above `exit 1`s otherwise), record the apply event in
      # coord.migration_applications. The applied revision == the authored head
      # computed by the same stdlib scan used for chain-head attestation. This
      # workflow targets the STAGING CANONICAL DB (see header line ~9), so
      # database = canonical-pg. Best-effort, fail-open — never gates, never
      # alters the (already-green) migrate outcome.
      - name: Report migration apply to coord
        continue-on-error: true
        env:
          COORD_INGEST_TOKEN: ${{ secrets.COORD_INGEST_TOKEN }}
        run: |
          set -uo pipefail
          HEADS_LINE=$(python3 - <<'PY'
          import os, re
          revs, parents = set(), set()
          d = "backend/alembic/versions"
          for f in os.listdir(d):
              if not f.endswith(".py"):
                  continue
              s = open(os.path.join(d, f), encoding="utf-8").read()
              m = re.search(r"^revision(?::\s*str)?\s*=\s*[\"']([^\"']+)", s, re.M)
              if m:
                  revs.add(m.group(1))
              for dm in re.finditer(r"^down_revision[^=]*=\s*(.+)", s, re.M):
                  for tok in re.findall(r"[\"']([^\"']+)[\"']", dm.group(1)):
                      parents.add(tok)
          heads = sorted(revs - parents)
          print(f"{','.join(heads)} {len(heads)}")
          PY
          )
          HEADS="${HEADS_LINE% *}"
          COUNT="${HEADS_LINE##* }"
          if [ -z "${HEADS:-}" ] || [ "${COUNT:-0}" != "1" ]; then
            echo "::warning::cannot report apply — authored head count=${COUNT:-0} (expected single head); skipping"
            exit 0
          fi
          echo "applied head: $HEADS"
          BODY=$(python3 -c "
          import json, os, sys
          print(json.dumps({
              'repo': 'qontinui/qontinui-web',
              'revision': sys.argv[1],
              'database': 'canonical-pg',
              'applied_by': 'migrate-workflow',
              'source_sha': os.environ.get('GITHUB_SHA'),
              'duration_ms': None,
          }))" "$HEADS")
          CODE=$(curl -s -o /tmp/apply_resp -w '%{http_code}' --max-time 20 \
            -X POST "https://coord.qontinui.io/coord/schema/applications" \
            -H "Authorization: Bearer $COORD_INGEST_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$BODY" || echo 000)
          if [ "$CODE" = "200" ]; then
            echo "apply reported: $(head -c 200 /tmp/apply_resp)"
          else
            echo "::warning::applications POST returned $CODE (best-effort): $(head -c 300 /tmp/apply_resp 2>/dev/null)"
          fi
          exit 0

      # ── Page on migration failure (best-effort) ───────────────────────────
      # A failed migrate run used to just turn red — nobody was paged, which is
      # exactly how web #538's silent migration failure went unnoticed on
      # 2026-06-08 (the /commits page then 500'd against the missing column for
      # hours). The org has no SNS/PagerDuty channel in any workflow, so this
      # mirrors the two patterns that DO exist:
      #   1. deploy-coord.yml's loud, page-worthy `::error::` annotation
      #      demanding manual intervention (its auto-rollback step), and
      #   2. automated GitHub-issue creation (qontinui/comprehensive-analysis.yml)
      #      — the one channel that actually emails repo watchers.
      # Best-effort: `continue-on-error` + trailing `exit 0` so a paging hiccup
      # can never mask (or alter) the underlying red run. De-dupes into one
      # open `migration-failure` issue (the nightly cron would otherwise file a
      # new issue every 24h while broken).
      - name: Page on migration failure
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-9)"

          echo "::error::MIGRATION APPLY FAILED on ${GITHUB_REPOSITORY}@${SHORT_SHA} — the staging RDS schema may be BEHIND the authored alembic head. Coord-proxied pages (e.g. /commits) degrade to 503 schema_migration_pending until this is fixed forward. MANUAL INTERVENTION REQUIRED: ${RUN_URL}"

          TITLE="migrate.yml FAILED: alembic apply did not complete"
          BODY="Migration apply failed.

          - **Repo:** ${GITHUB_REPOSITORY}
          - **Run:** ${RUN_URL}
          - **Head SHA:** ${GITHUB_SHA}
          - **Trigger:** ${GITHUB_EVENT_NAME}

          The staging RDS schema may be behind the authored alembic head; coord routes that need the new columns degrade to 503 \`schema_migration_pending\`. Migrations are FORWARD-ONLY — fix forward (see the workflow header comment), never downgrade.

          _Auto-filed by .github/workflows/migrate.yml; closes manually once a migrate run is green._"

          # Ensure the label exists (idempotent), then de-dupe into one issue.
          gh label create migration-failure \
            --repo "${GITHUB_REPOSITORY}" \
            --description "Auto-filed: migrate.yml apply failed" \
            --color B60205 --force || true

          EXISTING=$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --label migration-failure \
            --state open \
            --json number \
            --jq '.[0].number // empty' || true)

          if [ -n "${EXISTING}" ]; then
            echo "Open migration-failure issue #${EXISTING} exists — commenting."
            gh issue comment "${EXISTING}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body "Still failing: ${RUN_URL} (head ${GITHUB_SHA}, trigger ${GITHUB_EVENT_NAME})" \
              || echo "::warning::could not comment on issue #${EXISTING} (best-effort)"
          else
            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TITLE}" \
              --label migration-failure \
              --body "${BODY}" \
              || echo "::warning::could not create the migration-failure issue (best-effort)"
          fi
          exit 0
