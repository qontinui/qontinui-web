name: Frontend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    name: Lint and TypeScript check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout qontinui-web
        uses: actions/checkout@v4

      # actions/checkout@v4 refuses `path:` outside the workspace, so
      # clone the sibling repos via git directly. All repos here are
      # public, so no auth needed. (Previous config tried `jspinak/qontinui-schemas`
      # which doesn't exist — the actual repo is `qontinui/qontinui-schemas`.)
      - name: Checkout sibling repos
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git
          git clone --depth 1 https://github.com/qontinui/ui-bridge.git
          git clone --depth 1 https://github.com/qontinui/qontinui-workflow-ui.git
          git clone --depth 1 https://github.com/qontinui/qontinui-workflow-utils.git
          git clone --depth 1 https://github.com/qontinui/qontinui-navigation.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ui-bridge-eslint-plugin's dist/ is gitignored upstream — every
      # consumer must build it after cloning before lint can resolve it.
      # qontinui-schemas's dist/ IS committed, so shared-types resolves
      # without a build step. Workspace-scoped install (-w) avoids npm
      # walking up to the ui-bridge root and hitting a peer-dep conflict.
      - name: Build ui-bridge-eslint-plugin
        working-directory: ${{ github.workspace }}/../ui-bridge
        run: |
          npm install -w @qontinui/ui-bridge-eslint-plugin --no-audit --no-fund --legacy-peer-deps
          npm run build -w @qontinui/ui-bridge-eslint-plugin

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: TypeScript check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: ./frontend
        run: npm test
