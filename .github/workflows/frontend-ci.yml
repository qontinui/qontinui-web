name: Frontend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    name: Lint and TypeScript check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout qontinui-web
        uses: actions/checkout@v4

      # actions/checkout@v4 refuses to place repositories outside the
      # GITHUB_WORKSPACE root (the `path: ../<repo>` constraint that
      # historically worked started producing "Repository path … is not
      # under …" errors). Frontend tooling expects the sibling layout, so
      # we clone the dependent repos with plain git instead.
      - name: Clone sibling dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for spec in \
            "jspinak/qontinui-schemas" \
            "qontinui/ui-bridge" \
            "qontinui/qontinui-workflow-ui" \
            "qontinui/qontinui-workflow-utils" \
            "qontinui/qontinui-navigation" \
          ; do
            repo_name="${spec#*/}"
            target="../${repo_name}"
            echo "::group::Cloning ${spec} → ${target}"
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${spec}.git" \
              "${target}"
            echo "::endgroup::"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: TypeScript check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: ./frontend
        run: npm test
