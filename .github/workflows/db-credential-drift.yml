# DB credential drift detector (design plan 2026-06-08-fleet-policy-and-interception-rollout-design §7).
#
# Incident this guards: the qontinui/staging/migrator/database_url secret's
# password silently diverged from coord/web (a rotation updated some consumers
# but missed one). All `*/database_url` secrets for the SAME db user MUST share
# one password — RDS has one password per user. This job asserts that invariant
# across every qontinui/staging/*/database_url secret and FAILS (alert) on drift,
# naming the offending secret, BEFORE a migration/deploy hits the bad cred.
#
# Scope note: this is a cross-SECRET consistency check (no VPC needed — only
# Secrets Manager reads). It catches the real "rotation missed a consumer"
# pattern. It does NOT detect all-secrets-drifted-from-RDS (would need a VPC
# connect-test, e.g. a scheduled ECS task) — tracked as the stronger follow-up.

name: DB Credential Drift Detector

on:
  schedule:
    - cron: "17 6 * * *"   # daily 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read

env:
  AWS_REGION: eu-central-1
  SECRET_PREFIX: qontinui/staging/

jobs:
  drift-check:
    name: Assert per-user database_url passwords agree
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Compare database_url passwords across services
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, subprocess, sys, hashlib
          from urllib.parse import urlsplit, unquote

          REGION = "eu-central-1"
          PREFIX = "qontinui/staging/"

          def aws(*args):
              return subprocess.run(["aws", *args], capture_output=True, text=True, check=True).stdout

          # Discover every */database_url secret under the staging prefix
          # (one call per page; read SecretList + NextToken from the same response).
          names = []
          tok = None
          while True:
              cmd = ["aws", "secretsmanager", "list-secrets", "--region", REGION,
                     "--max-results", "100", "--output", "json"]
              if tok:
                  cmd += ["--next-token", tok]
              page = json.loads(subprocess.run(cmd, capture_output=True, text=True, check=True).stdout or "{}")
              names += [s["Name"] for s in page.get("SecretList", [])]
              tok = page.get("NextToken")
              if not tok:
                  break

          targets = sorted(n for n in set(names)
                           if n.startswith(PREFIX) and n.endswith("/database_url"))
          if not targets:
              print("::error::no */database_url secrets found under", PREFIX)
              sys.exit(1)

          print("Inspecting:", ", ".join(targets))

          # Group by (user, host, db); within a group the password MUST match.
          groups = {}   # key -> list[(name, pw_sha)]
          for name in targets:
              val = aws("secretsmanager", "get-secret-value", "--secret-id", name,
                        "--region", REGION, "--query", "SecretString", "--output", "text").strip()
              p = urlsplit(val)
              user = unquote(p.username or "")
              host = (p.hostname or "")
              db = (p.path or "/").lstrip("/").split("?")[0]
              pw = unquote(p.password or "")
              sha = hashlib.sha256(pw.encode()).hexdigest()[:12]
              groups.setdefault((user, host, db), []).append((name, sha))

          drift = False
          for (user, host, db), members in sorted(groups.items()):
              shas = {sha for _, sha in members}
              tag = f"user={user} host={host} db={db}"
              if len(shas) == 1:
                  print(f"OK  {tag}: {len(members)} secret(s) agree ({list(shas)[0]})")
              else:
                  drift = True
                  print(f"::error::DRIFT {tag}: passwords disagree across secrets:")
                  for n, s in sorted(members):
                      print(f"::error::    {n} -> pw_sha={s}")

          if drift:
              print("::error::DB credential drift detected — a */database_url secret is out of "
                    "sync with its peers for the same DB user. A migration/deploy using the "
                    "drifted secret will fail password auth. Rotate the offending secret to match.")
              sys.exit(1)
          print("No drift: all same-user database_url secrets share one password.")
          PY
