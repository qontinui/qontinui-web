name: Dev Credentials Drift

# Guards the single source of truth for local dev credentials
# (dev-credentials.json). Fails if a credential literal is hardcoded
# instead of read from the JSON, or if a retired password lingers.
#
# stdlib-only check — no path-dep clones, no poetry, ~seconds to run.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'dev-credentials.json'
      - 'backend/app/core/test_credentials.py'
      - 'frontend/tests/e2e/test-credentials.ts'
      - 'scripts/check_dev_credentials_drift.py'
      - '.github/workflows/dev-credentials-drift.yml'
  push:
    branches: [main, develop]
    paths:
      - 'dev-credentials.json'
      - 'backend/app/core/test_credentials.py'
      - 'frontend/tests/e2e/test-credentials.ts'
      - 'scripts/check_dev_credentials_drift.py'
  workflow_dispatch:

jobs:
  drift-check:
    name: Check dev-credentials single source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run drift check
        run: python scripts/check_dev_credentials_drift.py
