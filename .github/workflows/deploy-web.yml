name: Deploy Web Backend

# Builds the qontinui-web backend image and rolls it onto the staging ECS
# service (cluster qontinui-staging, service "web", region us-east-1). Mirrors
# the trigger model + AWS plumbing of staging-migrate.yml so staging's two
# halves — DB schema and the running image — deploy on the same cadence.
#
# Triggers:
#   - push to main when backend code / Dockerfile / deps change
#   - nightly schedule — the structural catch for "schemas moved, web didn't".
#     The 2026-05-23 outage was exactly this: qontinui-schemas #58 landed the
#     memory shared types, no web commit followed, so neither push nor dispatch
#     would rebuild — and the live image kept boot-failing. A nightly
#     schemas-SHA-cache-busted rebuild closes that drift class without anyone
#     having to notice.
#   - workflow_dispatch — redeploy a specific state / force a fresh schemas
#     pull on demand.
#
# Safety: the ECS service has its deployment circuit breaker enabled
# (enable+rollback). A crash-looping image auto-rolls-back to the prior
# task-def revision instead of flapping. The "Verify rollout" step below turns
# that silent rollback into a hard CI failure so a bad build is loud, not
# masked by a green services-stable wait.
#
# Memory: proj_web_main_blocked_schemas_memory_drift — the manual-build era this
# workflow ends. The Dockerfile's `git clone qontinui-schemas` RUN layer is the
# staleness trap; this workflow passes SCHEMAS_SHA to bust it deterministically.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-web.yml'
  schedule:
    - cron: '0 3 * * *'  # daily 03:00 UTC — catches schemas-only drift
  workflow_dispatch:
    inputs:
      # ── Rollback-mode inputs (deploy effect signatures, plan §4 Phase 4) ──
      # coord's deploy_rollback.rs dispatches THIS workflow with exactly
      # {rollback, source_image_or_commit, target_environment, correlation_id}
      # when an auto-eligible rollback is armed — GitHub 422-rejects a dispatch
      # carrying undeclared inputs, so these four MUST stay aligned with
      # maybe_dispatch_rollback's payload. Operators can use the same mode by
      # hand for a one-click "redeploy the prior artifact without a rebuild".
      rollback:
        description: "Set 'true' to SKIP the build and redeploy a prior artifact (rollback mode)"
        required: false
        default: "false"
      source_image_or_commit:
        description: "Rollback artifact: sha256:<digest> (preferred) or a commit SHA whose image tag exists in ECR"
        required: false
        default: ""
      target_environment:
        description: "Rollback declare metadata (staging/production)"
        required: false
        default: "production"
      correlation_id:
        description: "The FAILED deploy's signature id — chains the rollback declare to it"
        required: false
        default: ""

# One web deploy at a time; the latest commit's image is the one that
# should win. Cancel-in-progress is OFF: cancelling a deploy mid-flight
# (after image push, before ECS stabilize) risks a half-registered task-def
# or a service stuck draining with no replacement. Pending runs queue; the
# latest commit's image wins naturally when it reaches the deploy step.
concurrency:
  group: deploy-web
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: qontinui-web-backend
  ECS_CLUSTER: ${{ secrets.STAGING_ECS_CLUSTER }}
  ECS_SERVICE: web
  ECS_CONTAINER: web
  ECS_TASK_FAMILY: qontinui-staging-web
  API_BASE: https://api.qontinui.io/api/v1
  HEALTH_URL: https://api.qontinui.io/api/v1/health
  # The behavioral smoke reads CI-bot creds from SSM SecureString. Those
  # parameters live in eu-central-1 (the autonomous-work vault), NOT the
  # us-east-1 deploy region, so the get-parameter calls pass this region
  # explicitly rather than ${AWS_REGION}.
  SSM_REGION: eu-central-1
  # The D3 deploy effect-signature loop (qontinui-coord, plan
  # 2026-05-31-deploy-action-effect-signatures §3.6): the declare/verify steps
  # below report this deploy to coord's deploy verifier.
  COORD_BASE_URL: https://coord.qontinui.io
  DEPLOY_SERVICE: qontinui-web
  REPO_SLUG: qontinui/qontinui-web

jobs:
  deploy:
    name: Build, push, deploy web backend
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Check out qontinui-web
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"

      # Rollback mode: resolve the PRIOR artifact to an exact image reference
      # and assert it still exists in ECR — a rollback to a GC'd image must
      # fail HERE, loudly, not as an ECS pull crash-loop mid-rollover. The
      # release observer records deployed images by digest, so `sha256:…` is
      # the expected form; a commit SHA falls back to the full-SHA tag this
      # workflow stamps on every build.
      - name: Resolve rollback artifact
        id: rollback_artifact
        if: ${{ inputs.rollback == 'true' }}
        run: |
          ART="${{ inputs.source_image_or_commit }}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          if [ -z "$ART" ]; then
            echo "::error::rollback=true but source_image_or_commit is empty"
            exit 1
          fi
          case "$ART" in
            sha256:*)
              aws ecr describe-images --repository-name "$ECR_REPOSITORY" \
                --image-ids imageDigest="$ART" --region "$AWS_REGION" >/dev/null \
                || { echo "::error::rollback artifact $ART not found in ECR ($ECR_REPOSITORY)"; exit 1; }
              echo "image=$REGISTRY/$ECR_REPOSITORY@$ART" >> "$GITHUB_OUTPUT"
              ;;
            taskdef:*)
              # The dispatcher never sends this form today (rollback_target is
              # the observer's deployed digest); refuse honestly rather than
              # guess a family:revision mapping.
              echo "::error::taskdef:<n> rollback targets are not supported by this workflow"
              exit 1
              ;;
            *)
              aws ecr describe-images --repository-name "$ECR_REPOSITORY" \
                --image-ids imageTag="$ART" --region "$AWS_REGION" >/dev/null \
                || { echo "::error::rollback artifact tag $ART not found in ECR ($ECR_REPOSITORY)"; exit 1; }
              echo "image=$REGISTRY/$ECR_REPOSITORY:$ART" >> "$GITHUB_OUTPUT"
              ;;
          esac
          echo "Rolling back to: $ART"

      # The backend Dockerfile clones qontinui-schemas itself inside a build
      # stage (no sibling checkout needed). We resolve schemas' main SHA here
      # and pass it as SCHEMAS_SHA so the clone layer's cache key tracks the
      # real upstream commit — the layer re-clones iff schemas moved.
      - name: Resolve qontinui-schemas main SHA
        id: schemas
        if: ${{ inputs.rollback != 'true' }}
        run: |
          SHA=$(git ls-remote https://github.com/qontinui/qontinui-schemas.git refs/heads/main | cut -f1)
          if [ -z "$SHA" ]; then echo "::error::could not resolve qontinui-schemas main SHA"; exit 1; fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "qontinui-schemas main = $SHA"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${{ steps.ecr.outputs.registry }}"

      # Context is backend/ — the Dockerfile COPYs pyproject/poetry.lock and the
      # app tree from there and clones schemas in-image. Tag both the immutable
      # commit SHA (the task-def will pin this) and :staging (a convenience
      # pointer so :staging never lags the live service again).
      - name: Build backend image
        if: ${{ inputs.rollback != 'true' }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f backend/Dockerfile \
            --build-arg SCHEMAS_SHA=${{ steps.schemas.outputs.sha }} \
            -t "${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}" \
            -t "${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:staging" \
            --load \
            backend

      - name: Push backend image
        if: ${{ inputs.rollback != 'true' }}
        run: |
          docker push "${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          docker push "${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:staging"

      # Record the currently-live task-def BEFORE we point the service at the
      # new revision. This is the deterministic last-known-good rollback target
      # for the behavioral auto-rollback step below — the ECS circuit breaker
      # only covers boot crashes, not the "boots fine but is behaviorally broken"
      # class this captures. Must run before update-service so it reflects the
      # PRIOR image, not the one we are about to deploy.
      - name: Capture prior (last-known-good) task-def
        id: prior
        run: |
          PRIOR_TD=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}" \
            --region "${AWS_REGION}" \
            --query 'services[0].taskDefinition' --output text)
          if [ -z "$PRIOR_TD" ] || [ "$PRIOR_TD" = "None" ]; then
            echo "::error::could not resolve the currently-live task-def for ${ECS_SERVICE}"
            exit 1
          fi
          echo "prior_td=$PRIOR_TD" >> "$GITHUB_OUTPUT"
          echo "Last-known-good task-def = $PRIOR_TD"

      # ── Deploy effect signature: DECLARE (best-effort, §3.6) ──────────────
      # Declares this deploy to coord's D3 effect-signature loop
      # (POST /coord/deploys/declare) immediately before the service
      # transition, so the signature's startup window opens with the rollover.
      # The probe set comes from .qontinui/deploy.toml (coord runs in ECS and
      # cannot read repo files — this CI job is the trust boundary, §3.4); the
      # correlation_id joins the deploy to the land that triggered it via
      # GET /coord/lands (to_sha == GITHUB_SHA; absent on schedule/dispatch
      # runs, which is fine — correlation is best-effort).
      #
      # Best-effort BY DESIGN: any failure here warns and the deploy proceeds
      # — the effect loop observes deploys, it does not gate them. The
      # predict-and-check policy call is likewise REPORT-ONLY until the deploy
      # domain has calibration evidence (flipping it to blocking is a
      # deliberate future decision, not a default).
      - name: Declare deploy effect signature
        id: declare
        continue-on-error: true
        run: |
          set -uo pipefail

          # Rollback mode (plan §4 Phase 4): the rollback IS a deploy and gets
          # its own signature — declared with the PRIOR artifact as the target,
          # source `orchestrator`, and correlation_id = the FAILED deploy's
          # signature id (forwarded by the dispatcher), so the two chain.
          ROLLBACK="${{ inputs.rollback }}"
          DECLARE_SHA="$GITHUB_SHA"
          SOURCE="ci"
          TARGET_ENV="production"
          CORR="${{ inputs.correlation_id }}"
          if [ "$ROLLBACK" = "true" ]; then
            DECLARE_SHA="${{ inputs.source_image_or_commit }}"
            SOURCE="orchestrator"
            TARGET_ENV="${{ inputs.target_environment || 'production' }}"
          fi

          # 1. Land correlation (best-effort, normal mode only): the land
          #    verifier stamps a correlation_id on the land that advanced main
          #    to this SHA.
          if [ -z "$CORR" ] && [ "$ROLLBACK" != "true" ]; then
          CORR=$(curl -s --max-time 10 "$COORD_BASE_URL/coord/lands?repo=$REPO_SLUG&limit=50" \
            | python3 -c '
          import json, sys, os
          sha = os.environ["GITHUB_SHA"]
          try:
              lands = json.load(sys.stdin).get("lands") or []
          except Exception:
              lands = []
          for land in lands:
              if (land.get("to_sha") or "") == sha and land.get("correlation_id"):
                  print(land["correlation_id"])
                  break
          ' || true)
          fi
          echo "correlation_id: ${CORR:-none} (rollback=$ROLLBACK)"

          # 2. Probe set from .qontinui/deploy.toml ([[deploy.health_probes]]).
          #    Tolerates the file being absent (coord then derives its default
          #    GET /health probe server-side).
          PROBES=$(python3 - <<'PY' || echo '[]'
          import json, pathlib, tomllib
          path = pathlib.Path(".qontinui/deploy.toml")
          probes = []
          if path.exists():
              cfg = tomllib.loads(path.read_text())
              for p in cfg.get("deploy", {}).get("health_probes") or []:
                  out = {
                      "endpoint": p["endpoint"],
                      "expected_status": int(p.get("expected_status", 200)),
                  }
                  if "method" in p:
                      out["method"] = str(p["method"]).upper()
                  assertion = p.get("expected_body_assertion") or p.get("body_assertion")
                  if assertion:
                      out["expected_body_assertion"] = assertion
                  if "timeout_ms" in p:
                      out["timeout_ms"] = int(p["timeout_ms"])
                  probes.append(out)
          print(json.dumps(probes))
          PY
          )
          PROBES=${PROBES:-[]}
          echo "declared probes: $(printf '%s' "$PROBES" | python3 -c 'import json,sys;print(len(json.load(sys.stdin)))' 2>/dev/null || echo '?')"

          BODY=$(jq -n \
            --arg service "$DEPLOY_SERVICE" \
            --arg sha "$DECLARE_SHA" \
            --arg source "$SOURCE" \
            --arg env "$TARGET_ENV" \
            --arg corr "${CORR:-}" \
            --argjson probes "$PROBES" \
            '{service: $service,
              source_image_or_commit: $sha,
              target_environment: $env,
              source: $source,
              health_probes: $probes}
             + (if $corr != "" then {correlation_id: $corr} else {} end)')

          # 3. REPORT-ONLY policy check (deploy_safety + infra_apply_safety +
          #    migrate_safety, worst-across). An escalation annotates the run;
          #    it does not block.
          PAC=$(curl -s --max-time 20 -X POST "$COORD_BASE_URL/coord/deploys/predict-and-check" \
            -H 'Content-Type: application/json' -d "$BODY" || true)
          RES=$(printf '%s' "$PAC" | jq -r '.composed.resolution // empty' 2>/dev/null || true)
          echo "predict-and-check: ${RES:-unavailable}"
          if [ "$RES" = "escalate" ]; then
            echo "::warning::deploy predict-and-check ESCALATED (report-only): $(printf '%s' "$PAC" | jq -c '[.domains[]? | select(.verdict == "escalate") | {domain, reason}]' 2>/dev/null || true)"
          fi

          # 4. Declare. The signature_id feeds the post-rollout verify step.
          RESP=$(curl -s --max-time 20 -X POST "$COORD_BASE_URL/coord/deploys/declare" \
            -H 'Content-Type: application/json' -d "$BODY" || true)
          SIG=$(printf '%s' "$RESP" | jq -r '.signature_id // empty' 2>/dev/null || true)
          if [ -n "$SIG" ]; then
            echo "Declared deploy signature: $SIG"
            echo "signature_id=$SIG" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::deploy declare did not persist a signature (best-effort, deploy proceeds): $(printf '%s' "$RESP" | head -c 300)"
          fi
          exit 0

      # Register a new immutable task-def revision pinned to the commit SHA
      # image (not :staging) so each deploy is a distinct, traceable revision
      # and circuit-breaker rollback has a clean prior target.
      - name: Register task-def revision + update service
        id: deploy
        run: |
          # Normal mode deploys the image built above; rollback mode deploys
          # the resolved prior artifact (digest-pinned) without a rebuild.
          if [ "${{ inputs.rollback }}" = "true" ]; then
            NEW_IMAGE="${{ steps.rollback_artifact.outputs.image }}"
          else
            NEW_IMAGE="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          fi
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_FAMILY}" \
            --region "${AWS_REGION}" \
            --query 'taskDefinition' --output json > td.json

          python3 - "$NEW_IMAGE" <<'PY'
          import json, sys
          new_image = sys.argv[1]
          td = json.load(open("td.json"))
          # Repoint any container that runs the web backend image; tolerant of
          # the container being renamed.
          for c in td["containerDefinitions"]:
              if "qontinui-web-backend" in c.get("image", ""):
                  c["image"] = new_image
          # Strip read-only fields register-task-definition rejects.
          for k in ("taskDefinitionArn", "revision", "status", "requiresAttributes",
                    "compatibilities", "registeredAt", "registeredBy", "deregisteredAt"):
              td.pop(k, None)
          json.dump(td, open("td-new.json", "w"))
          PY

          NEW_TD=$(aws ecs register-task-definition \
            --cli-input-json file://td-new.json \
            --region "${AWS_REGION}" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered $NEW_TD"
          echo "new_td=$NEW_TD" >> "$GITHUB_OUTPUT"

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "$NEW_TD" \
            --region "${AWS_REGION}" >/dev/null
          echo "Service update requested -> $NEW_TD"

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --region "${AWS_REGION}"

      # services-stable also returns green AFTER a circuit-breaker rollback (the
      # service is "stable" on the OLD revision). Compare the live task-def to
      # the one we registered: a mismatch means our image crash-looped and was
      # rolled back — fail loudly with the crash log.
      - name: Verify rollout (catch circuit-breaker rollback)
        run: |
          LIVE_TD=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}" \
            --region "${AWS_REGION}" \
            --query 'services[0].taskDefinition' --output text)
          EXPECTED="${{ steps.deploy.outputs.new_td }}"
          echo "live=$LIVE_TD expected=$EXPECTED"
          if [ "$LIVE_TD" != "$EXPECTED" ]; then
            echo "::error::Circuit breaker rolled the deploy back (live=$LIVE_TD). The new image likely crash-looped on boot. Recent web container log:"
            STREAM=$(aws logs describe-log-streams --log-group-name "/ecs/qontinui-staging/web" \
              --region "${AWS_REGION}" --order-by LastEventTime --descending --max-items 1 \
              --query 'logStreams[0].logStreamName' --output text)
            aws logs get-log-events --log-group-name "/ecs/qontinui-staging/web" \
              --log-stream-name "$STREAM" --region "${AWS_REGION}" --limit 40 \
              --query 'events[].message' --output text 2>/dev/null | tail -40 || true
            exit 1
          fi

      # Behavioral post-deploy smoke (replaces the old shallow liveness curl).
      # The ECS circuit breaker already covers boot crashes; this is the
      # BEHAVIORAL layer it can't see — a process that boots green but serves
      # 5xx for routing/auth, or whose DB-backed readiness never recovers. On
      # FAILURE the next step auto-rolls-back to the prior task-def.
      #
      # Auth model (post Cognito legacy-auth teardown): there is no local
      # /auth/jwt/login — it must 404. The authenticated probe mints a CI-bot
      # Cognito id token via the public CI app-client (USER_PASSWORD_AUTH
      # InitiateAuth against cognito-idp), then exercises two bearer-protected
      # reads. The unauthenticated readiness/middleware checks run FIRST and
      # absorb the post-deploy settle time; transient 5xx/000 on any probe are
      # retried, a settled wrong status is a hard (rollback-triggering) failure.
      - name: Post-deploy behavioral smoke
        id: smoke
        run: |
          set -uo pipefail

          # GET retry: succeeds when the endpoint returns $expect within the
          # 5x10s window. A 5xx or connection failure (000) is retried; an
          # unexpected non-5xx status fails fast (it will not self-heal).
          # Echoes the body of the final attempt on failure for debugging.
          expect_get() {
            local url="$1" expect="$2" auth="${3:-}"
            local code
            for i in 1 2 3 4 5; do
              if [ -n "$auth" ]; then
                code=$(curl -s -o /tmp/smoke_body -w '%{http_code}' \
                  -H "Authorization: Bearer $auth" "$url") || code=000
              else
                code=$(curl -s -o /tmp/smoke_body -w '%{http_code}' "$url") || code=000
              fi
              echo "  attempt $i: GET $url -> $code (want $expect)"
              if [ "$code" = "$expect" ]; then return 0; fi
              # Retry transient conditions; fail fast on a settled wrong answer.
              if [ "$code" = "000" ] || [ "${code:0:1}" = "5" ]; then
                sleep 10; continue
              fi
              echo "::error::GET $url returned $code, expected $expect"
              head -c 500 /tmp/smoke_body || true; echo
              return 1
            done
            echo "::error::GET $url never returned $expect (last=$code)"
            head -c 500 /tmp/smoke_body || true; echo
            return 1
          }

          API="${API_BASE}"

          echo "== 1. Readiness + liveness (DB-backed) =="
          expect_get "${API}/health/ready" 200 || exit 1
          expect_get "${API}/health" 200 || exit 1

          echo "== 2. Auth middleware up (must not 5xx) =="
          # Protected route with no credentials must answer 401, not 5xx.
          expect_get "${API}/auth/users/me" 401 || exit 1

          # The local password endpoint was deleted in the Cognito legacy-auth
          # teardown: POST /auth/jwt/login must now 404 (routed, endpoint gone).
          # A deterministic 404 is the post-teardown pass (was 401 pre-teardown);
          # 5xx/000 are transient and retried.
          gone_ok=""
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST "${API}/auth/jwt/login" \
              -H 'Content-Type: application/x-www-form-urlencoded' \
              --data-urlencode 'username=ci-smoke-nobody@qontinui.invalid' \
              --data-urlencode 'password=definitely-not-the-password' || echo 000)
            echo "  attempt $i: POST /auth/jwt/login -> $code (want 404, local auth removed)"
            if [ "$code" = "404" ]; then gone_ok=1; break; fi
            if [ "$code" = "000" ] || [ "${code:0:1}" = "5" ]; then
              sleep 10; continue
            fi
            echo "::error::POST /auth/jwt/login returned $code, expected 404 (local auth must be deleted)"
            exit 1
          done
          if [ -z "$gone_ok" ]; then
            echo "::error::POST /auth/jwt/login never returned 404"
            exit 1
          fi

          echo "== 3. Authenticated critical path =="
          # Read CI-bot creds from SSM (eu-central-1). Never echoed; piped
          # straight into the form POST below.
          CI_EMAIL=$(aws ssm get-parameter --name /qontinui/spec-ci/auth-email \
            --with-decryption --region "${SSM_REGION}" \
            --query Parameter.Value --output text)
          CI_PASSWORD=$(aws ssm get-parameter --name /qontinui/spec-ci/auth-password \
            --with-decryption --region "${SSM_REGION}" \
            --query Parameter.Value --output text)
          if [ -z "$CI_EMAIL" ] || [ "$CI_EMAIL" = "None" ] || \
             [ -z "$CI_PASSWORD" ] || [ "$CI_PASSWORD" = "None" ]; then
            # Harness/permissions gap, NOT a behavioral failure. Skipping the
            # authed probe degrades the smoke to its health+routing gate (which
            # already passed) rather than failing — a missing IAM grant must
            # never trigger a rollback of a likely-fine deploy. Grant the deploy
            # IAM principal ssm:GetParameter + kms:Decrypt on
            # /qontinui/spec-ci/auth-* in ${SSM_REGION} to enable the full
            # authenticated smoke.
            echo "::warning::could not read CI-bot creds from SSM (${SSM_REGION}); skipping the authenticated probe (health + routing checks passed). NOT rolling back — a creds/harness gap is not a behavioral failure."
            exit 0
          fi

          # Cognito is the sole auth mechanism post-teardown: mint a CI-bot id
          # token via the public CI app-client (USER_PASSWORD_AUTH InitiateAuth,
          # no secret) instead of the deleted /auth/jwt/login. The backend's
          # Cognito arm verifies it (the CI client id is in
          # COGNITO_ALLOWED_AUDIENCES). The password never hits stdout — only
          # the JSON response is captured and parsed for the IdToken.
          COGNITO_CI_CLIENT_ID="tb0epbojige1900ipu6q80j6b"
          TOKEN=""
          for i in 1 2 3; do
            resp=$(curl -s -X POST "https://cognito-idp.us-east-1.amazonaws.com/" \
              -H 'Content-Type: application/x-amz-json-1.1' \
              -H 'X-Amz-Target: AWSCognitoIdentityProviderService.InitiateAuth' \
              -d "{\"AuthFlow\":\"USER_PASSWORD_AUTH\",\"ClientId\":\"${COGNITO_CI_CLIENT_ID}\",\"AuthParameters\":{\"USERNAME\":\"${CI_EMAIL}\",\"PASSWORD\":\"${CI_PASSWORD}\"}}" || echo "")
            TOKEN=$(printf '%s' "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("AuthenticationResult",{}).get("IdToken",""))' 2>/dev/null || echo "")
            if [ -n "$TOKEN" ]; then echo "  Cognito InitiateAuth OK; id token obtained"; break; fi
            echo "  attempt $i: Cognito InitiateAuth yielded no IdToken; retrying"
            sleep 10
          done
          if [ -z "$TOKEN" ]; then
            echo "::error::CI-bot Cognito InitiateAuth did not yield an IdToken"
            exit 1
          fi

          # Two representative authenticated reads with the bearer:
          #   /auth/users/me -> 200  (identity + coord-tenant resolution path)
          #   /projects      -> 200  (DB-backed list; empty list is a valid 200)
          expect_get "${API}/auth/users/me" 200 "$TOKEN" || exit 1
          expect_get "${API}/projects" 200 "$TOKEN" || exit 1

          echo "Post-deploy behavioral smoke PASSED."

      # Behavioral auto-rollback. Fires ONLY when the smoke step itself failed
      # (steps.smoke.conclusion == 'failure'), which by construction can only
      # happen after the new revision is live (it runs after wait-stable +
      # verify-rollout). An earlier build/register/update failure leaves
      # PRIOR_TD still serving, so this step is correctly skipped then. Re-points
      # the service at the deterministic last-known-good task-def, waits for it
      # to stabilize, and fails the job loudly.
      - name: Auto-rollback on behavioral smoke failure
        if: ${{ failure() && steps.smoke.conclusion == 'failure' }}
        run: |
          PRIOR_TD="${{ steps.prior.outputs.prior_td }}"
          if [ -z "$PRIOR_TD" ] || [ "$PRIOR_TD" = "None" ]; then
            echo "::error::behavioral smoke failed but no prior task-def was captured; cannot auto-rollback. Investigate ${ECS_SERVICE} manually."
            exit 1
          fi
          echo "Behavioral smoke failed — rolling back ${ECS_SERVICE} to last-known-good: $PRIOR_TD"
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "$PRIOR_TD" \
            --region "${AWS_REGION}" >/dev/null
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --region "${AWS_REGION}"
          echo "::error::post-deploy smoke failed; rolled back to $PRIOR_TD"
          exit 1

      # ── Deploy effect signature: VERIFY (best-effort, report-only) ────────
      # Fires one verification after the rollout settled (or failed + rolled
      # back — `always()` so honest Failures land too; failures are what the
      # calibration flywheel needs most). The call runs the declared
      # transition probes server-side and persists the composed verdict to
      # coord.deploy_verifications.
      #
      # Report-only: a red verdict annotates, never fails the job — the smoke
      # + auto-rollback steps above already ENFORCE; this step RECORDS. The
      # Ci/Config dimensions settle on a ~minutes horizon, so
      # `settled:false, composed:partial` here is normal — any later
      # POST /coord/deploys/verify (same signature_id) settles it.
      - name: Verify deploy effect signature
        if: ${{ always() && steps.declare.outputs.signature_id != '' }}
        continue-on-error: true
        run: |
          SIG="${{ steps.declare.outputs.signature_id }}"
          RESP=$(curl -s --max-time 60 -X POST "$COORD_BASE_URL/coord/deploys/verify" \
            -H 'Content-Type: application/json' \
            -d "{\"signature_id\":\"$SIG\"}" || true)
          if ! printf '%s' "$RESP" | jq '{composed_outcome, settled, coverage, rationale,
                dimensions: [.dimension_verdicts[]? | {dimension, outcome, detail}]}' 2>/dev/null; then
            echo "::warning::deploy verify response unparseable (best-effort)"
            printf '%s' "$RESP" | head -c 500; echo
            exit 0
          fi
          OUT=$(printf '%s' "$RESP" | jq -r '.composed_outcome // empty' 2>/dev/null || true)
          case "$OUT" in
            failure|contradiction)
              echo "::warning::deploy verification composed '$OUT' (report-only) — signature $SIG; inspect GET $COORD_BASE_URL/coord/deploys/$SIG" ;;
          esac
          exit 0
