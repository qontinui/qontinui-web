name: Migration Reversal Test

# S4.3 non-gating safety net (ADR 2026-06-18-review-moves-left): proves every new
# alembic migration is REVERSIBLE (up → down → up on an ephemeral Postgres) so the
# coord escalate-path gate on `alembic/versions/**` can be retired.
#
# REQUIRED-CHECK SAFE: this runs on EVERY PR (no `paths:` filter) and always emits
# the `Migration Reversal Gate` check, so it can be a required status check without
# wedging PRs that don't touch migrations (the path-filtered-required-check footgun).
# The expensive job (`reverse`) only runs when alembic/versions changed; the always-run
# `gate` job is the one to mark required.

on:
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect alembic migration changes
        id: detect
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base"...HEAD | grep -qE '^backend/alembic/versions/.*\.py$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Alembic migration changes detected — reversibility test will run."
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No alembic migration changes — reversibility test not needed."
          fi

  reverse:
    needs: detect
    if: needs.detect.outputs.relevant == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector image: models with a Vector column need the `vector` type, so
        # `alembic upgrade head` (which imports every model) fails on stock pg16.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: qontinui_user
          POSTGRES_PASSWORD: qontinui_dev_password
          POSTGRES_DB: qontinui_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      # qontinui (a path-dep) pulls torch — large enough to overflow runner disk.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      # Backend's pyproject.toml has path-deps on sibling repos; actions/checkout
      # refuses `path:` outside the workspace, so clone them to the parent dir
      # (mirrors backend-ci.yml).
      - name: Checkout sibling repos (qontinui-schemas, qontinui, qontinui-cloud-control)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git
          git clone --depth 1 https://github.com/jspinak/qontinui.git
          git clone --depth 1 https://github.com/qontinui/qontinui-cloud-control.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install poetry
          poetry install

      - name: Create named schemas + extension
        env:
          PGPASSWORD: qontinui_dev_password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U qontinui_user -d qontinui_test \
            -c "CREATE SCHEMA IF NOT EXISTS project;" \
            -c "CREATE SCHEMA IF NOT EXISTS auth;" \
            -c "CREATE SCHEMA IF NOT EXISTS cloud;" \
            -c "CREATE SCHEMA IF NOT EXISTS coord;" \
            -c "CREATE SCHEMA IF NOT EXISTS strategy;" \
            -c "CREATE SCHEMA IF NOT EXISTS web;" \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      # up → down -1 → up. The downgrade must cleanly reverse the newest migration
      # (the one this PR adds) and the re-upgrade must re-apply it.
      - name: Reversibility test (upgrade → downgrade -1 → upgrade)
        env:
          DATABASE_URL: postgresql://qontinui_user:qontinui_dev_password@localhost:5432/qontinui_test
          SECRET_KEY: test-secret-key-for-testing-only-minimum-32-characters-long
          ENVIRONMENT: development
          TESTING: 1
        run: |
          cd backend
          set -euo pipefail
          echo "== upgrade head =="
          poetry run alembic upgrade head
          echo "== downgrade -1 =="
          poetry run alembic downgrade -1
          echo "== upgrade head (re-apply) =="
          poetry run alembic upgrade head
          echo "Migration reversal test passed."

  # Always-run aggregate — THIS is the required status check. Passes when migrations
  # were untouched (reverse skipped) or when the reversal test succeeded; fails only
  # on a genuine reversal failure. Never a phantom: it runs on every PR.
  gate:
    name: Migration Reversal Gate
    needs: [detect, reverse]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          relevant="${{ needs.detect.outputs.relevant }}"
          result="${{ needs.reverse.result }}"
          echo "relevant=$relevant reverse.result=$result"
          if [ "$relevant" = "true" ] && [ "$result" != "success" ]; then
            echo "::error::migration reversibility test did not pass (result=$result)"
            exit 1
          fi
          echo "Migration Reversal Gate OK."
