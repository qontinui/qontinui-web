repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.5.6
    hooks:
      - id: ruff
        args: [--fix]
        additional_dependencies: []
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.9.0
    hooks:
      - id: eslint
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        types_or: [javascript, jsx, ts, tsx]
        additional_dependencies: []

  - repo: local
    hooks:
      - id: validate-line-endings
        name: Validate no CRLF left (text files)
        entry: bash -c 'if git grep -I $'"'\r'"'$ -- "$(git rev-parse --show-toplevel)" >/dev/null; then echo "CRLF line endings detected. Convert to LF." >&2; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]

ci:
  autofix_prs: true
  autofix_commit_msg: "chore: pre-commit auto fixes"
