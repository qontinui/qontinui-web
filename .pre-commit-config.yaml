repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^frontend/test-fixtures/vga/canonical-state-machine\.canonical\.json$
      - id: end-of-file-fixer
        exclude: ^frontend/test-fixtures/vga/canonical-state-machine\.canonical\.json$
      - id: trailing-whitespace
        exclude: ^frontend/test-fixtures/vga/canonical-state-machine\.canonical\.json$
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        entry: bash -c 'args=(); for f in "$@"; do args+=("${f#frontend/}"); done; cd frontend && npx eslint --no-warn-ignored "${args[@]}"' --
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        types_or: [javascript, jsx, ts, tsx]

      - id: prettier
        name: Prettier (frontend)
        entry: bash -c 'args=(); for f in "$@"; do args+=("${f#frontend/}"); done; cd frontend && npx prettier --check "${args[@]}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css)$
        exclude: ^(node_modules/|dist/)

      - id: tsc-typecheck
        name: TypeScript type check (frontend)
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$

      - id: mypy
        name: Python type check (mypy)
        entry: bash -c 'cd backend && poetry run mypy .'
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$

      - id: validate-line-endings
        name: Validate no CRLF left (text files)
        entry: bash -c 'if git grep -I $'"'\r'"'$ -- "$(git rev-parse --show-toplevel)" >/dev/null; then echo "CRLF line endings detected. Convert to LF." >&2; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: alembic-schema-arg-gate
        name: Alembic ops require schema= (consolidation gate)
        entry: python .pre-commit-hooks/check_alembic_schema_args.py
        language: system
        files: ^backend/alembic/(_staged_consolidation|versions)/.*\.py$
        # Scope is currently narrowed to _staged_consolidation/ inside
        # the script itself. Expand to versions/ after the consolidation
        # transplant lands (see TODO in the script).

  - repo: local
    hooks:
      - id: block-claude-attribution
        name: Block Claude Attribution
        entry: .pre-commit-hooks/block-claude-attribution.sh
        language: script
        stages: [commit-msg]

ci:
  autofix_prs: true
  autofix_commit_msg: "chore: pre-commit auto fixes"
