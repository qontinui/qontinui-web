# NOTE (2026-05-01): Postgres service removed. Canonical PG runs from
# qontinui-stack at port 5433; this repo's containers no longer ship
# their own. Run `docker compose -f D:/qontinui-root/qontinui-stack/docker-compose.yml up -d`
# to start canonical PG/Redis/MinIO. See topology plan §3 for context.
#
# Redis and MinIO are kept here because the FastAPI backend currently uses
# them on the legacy ports (6379, 9000) for sessions and blob storage.
# Migration to canonical Redis/MinIO is a follow-up if needed.

services:
  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: qontinui-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: qontinui-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Client - Create bucket on startup
  minio-client:
    image: minio/mc:latest
    container_name: qontinui-minio-client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/qontinui --ignore-existing;
      /usr/bin/mc anonymous set download myminio/qontinui;
      exit 0;
      "

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
