[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
check_untyped_defs = True
strict_equality = True
ignore_missing_imports = True
exclude = alembic|migrations|tests|user_projects|scripts|(.*/)?test_.*\.py$|(.*/)?test-.*\.py$|(.*/)?create-test-.*\.py$|(.*/)?create_admin\.py$|(.*/)?run_worker\.py$
packages = app
warn_unreachable = False
mypy_path = stubs
explicit_package_bases = True
