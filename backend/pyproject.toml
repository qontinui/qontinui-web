[tool.poetry]
name = "backend"
version = "0.1.0"
description = "Backend for qontinui-web"
authors = ["Joshua Spinak <jspinak@hotmail.com>"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.116.2"
sqlalchemy = "^2.0.43"
uvicorn = "^0.36.0"
pydantic = "^2.11.9"
python-jose = "^3.5.0"
passlib = "^1.7.4"
python-multipart = "^0.0.20"
pydantic-settings = "^2.10.1"
email-validator = "^2.3.0"
slowapi = "^0.1.9"
aiosmtplib = "^4.0.2"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
