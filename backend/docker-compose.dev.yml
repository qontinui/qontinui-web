# NOTE (2026-05-01): Postgres service removed. Canonical PG runs from
# qontinui-stack at port 5433. Run from D:/qontinui-root/qontinui-stack:
#     docker compose up -d
# Topology plan §3 covers the single-canonical-PG design.
#
# Redis kept for the legacy backend session store. Canonical Redis (6380)
# is separate; migration is a follow-up if needed.

services:
  redis:
    image: redis:7-alpine
    container_name: qontinui-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
