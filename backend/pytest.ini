[pytest]
# Pytest configuration for integration testing

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Add backend root to sys.path so `from tests.utils...` absolute imports
# resolve (pytest's default prepend mode otherwise only exposes individual
# test modules, not the `tests` package itself).
pythonpath = .

# Minimum version
minversion = 7.0

# CLI options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Coverage reporting
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    # Strict markers - fail on unknown markers
    --strict-markers
    # Warnings as errors (optional, comment out if too strict)
    # --strict-config

# Markers
markers =
    integration: Integration tests that test multiple components together
    e2e: End-to-end tests that test complete workflows
    slow: Tests that take a long time to run
    requires_api: Tests that require a live API connection
    unit: Unit tests for individual components

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
