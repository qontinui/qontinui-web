# Self-contained gitleaks config. `[extend] useDefault = true` is load-bearing:
# without it gitleaks has NO rules and detects nothing.
[extend]
useDefault = true

[allowlist]
description = "qontinui allowlist — paths/regexes exempt from scanning"
paths = [
  '''docs/examples/.*''',
  '''.*/__snapshots__/.*''',
  '''.*\.lock$''',
]
regexes = [
  '''(?i)(dummy|example|sample|test|placeholder|changeme|your[-_]?)[-_]?(secret|token|key|password)''',
  '''AKIAIOSFODNN7EXAMPLE''',
  # Canonical non-secret dev/test DB password used across CI + conftest +
  # docker-compose. Not a production credential; exempt repo-wide so PRs that
  # touch CI/test DB config don't false-positive (gitleaks scans the commit
  # range, so it trips on any commit that introduces this literal).
  '''qontinui_dev_password''',
  # Planted fake fixtures in backend/tests/test_memory_redaction.py (the
  # memory-write secret-sweep unit tests): a second canonical-style AWS
  # key, a fake sk- keyed-secret, and the fake PEM body. Each regex
  # matches only its fabricated fixture, never a real-credential shape.
  # Same range-scan rationale as above: the introducing commit stays in
  # every scanned range, so these stay allowlisted even if the test
  # literals are later refactored.
  '''AKIAIOSFODNN7EXAMPL2''',
  '''sk-abcdef1234567890''',
  '''MIIEpAIBAAKCAQEA7bq0\\nmoresecretbytes''',
]
